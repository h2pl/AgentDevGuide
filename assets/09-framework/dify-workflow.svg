<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </linearGradient>
    <filter id="s3" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="880" height="520" fill="url(#bg3)" rx="12"/>

  <text x="440" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">Dify 工作流可视化编排</text>
  <text x="440" y="52" text-anchor="middle" font-size="12" fill="#78716c">拖拽节点 → 连接流转 → 一键发布 API</text>

  <!-- User Input -->
  <rect x="30" y="80" width="100" height="50" rx="25" fill="#f97316" filter="url(#s3)"/>
  <text x="80" y="103" text-anchor="middle" font-size="12" fill="white" font-weight="600">用户输入</text>
  <text x="80" y="118" text-anchor="middle" font-size="10" fill="#fed7aa">💬 聊天 / API</text>

  <!-- Arrow -->
  <line x1="130" y1="105" x2="165" y2="105" stroke="#94a3b8" stroke-width="2" marker-end="url(#a3)"/>

  <!-- Question Classifier -->
  <rect x="170" y="75" width="130" height="60" rx="8" fill="#2563eb" filter="url(#s3)"/>
  <text x="235" y="100" text-anchor="middle" font-size="12" fill="white" font-weight="600">问题分类</text>
  <text x="235" y="118" text-anchor="middle" font-size="10" fill="#bfdbfe">🎯 意图识别</text>

  <!-- Branch lines -->
  <line x1="235" y1="135" x2="235" y2="165" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="235" y1="165" x2="420" y2="165" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="235" y1="165" x2="420" y2="240" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="235" y1="165" x2="420" y2="315" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Branch labels -->
  <text x="310" y="160" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="600">售后</text>
  <text x="310" y="235" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="600">咨询</text>
  <text x="310" y="310" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="600">投诉</text>

  <!-- Branch 1: 售后 -->
  <rect x="420" y="85" width="110" height="40" rx="6" fill="#7c3aed" filter="url(#s3)"/>
  <text x="475" y="110" text-anchor="middle" font-size="11" fill="white" font-weight="500">📚 知识检索</text>
  <line x1="530" y1="105" x2="560" y2="105" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a3)"/>
  <rect x="565" y="85" width="110" height="40" rx="6" fill="#059669" filter="url(#s3)"/>
  <text x="620" y="110" text-anchor="middle" font-size="11" fill="white" font-weight="500">🤖 LLM 生成</text>
  <line x1="675" y1="105" x2="705" y2="105" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- Branch 2: 咨询 -->
  <rect x="420" y="220" width="110" height="40" rx="6" fill="#7c3aed" filter="url(#s3)"/>
  <text x="475" y="245" text-anchor="middle" font-size="11" fill="white" font-weight="500">📚 知识检索</text>
  <line x1="530" y1="240" x2="560" y2="240" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a3)"/>
  <rect x="565" y="220" width="110" height="40" rx="6" fill="#059669" filter="url(#s3)"/>
  <text x="620" y="245" text-anchor="middle" font-size="11" fill="white" font-weight="500">🤖 LLM 生成</text>
  <line x1="675" y1="240" x2="705" y2="240" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- Branch 3: 投诉 -->
  <rect x="420" y="295" width="110" height="40" rx="6" fill="#059669" filter="url(#s3)"/>
  <text x="475" y="320" text-anchor="middle" font-size="11" fill="white" font-weight="500">🤖 LLM 安抚</text>
  <line x1="530" y1="315" x2="560" y2="315" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a3)"/>
  <rect x="565" y="295" width="110" height="40" rx="6" fill="#dc2626" filter="url(#s3)"/>
  <text x="620" y="320" text-anchor="middle" font-size="11" fill="white" font-weight="500">🌐 创建工单</text>
  <line x1="675" y1="315" x2="705" y2="315" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- Merge to Output -->
  <rect x="710" y="95" width="70" height="40" rx="6" fill="#64748b" filter="url(#s3)"/>
  <text x="745" y="120" text-anchor="middle" font-size="11" fill="white" font-weight="500">📤 输出</text>
  <rect x="710" y="230" width="70" height="40" rx="6" fill="#64748b" filter="url(#s3)"/>
  <text x="745" y="255" text-anchor="middle" font-size="11" fill="white" font-weight="500">📤 输出</text>
  <rect x="710" y="305" width="70" height="40" rx="6" fill="#64748b" filter="url(#s3)"/>
  <text x="745" y="330" text-anchor="middle" font-size="11" fill="white" font-weight="500">📤 输出</text>

  <!-- Node Legend -->
  <rect x="80" y="380" width="720" height="120" rx="8" fill="white" opacity="0.8" filter="url(#s3)"/>
  <text x="100" y="405" font-size="13" font-weight="600" fill="#1e293b">Dify 10 种节点类型</text>

  <rect x="100" y="415" width="70" height="24" rx="4" fill="#f97316"/><text x="135" y="432" text-anchor="middle" font-size="9" fill="white">开始</text>
  <rect x="180" y="415" width="70" height="24" rx="4" fill="#2563eb"/><text x="215" y="432" text-anchor="middle" font-size="9" fill="white">LLM</text>
  <rect x="260" y="415" width="70" height="24" rx="4" fill="#7c3aed"/><text x="295" y="432" text-anchor="middle" font-size="9" fill="white">知识检索</text>
  <rect x="340" y="415" width="70" height="24" rx="4" fill="#0891b2"/><text x="375" y="432" text-anchor="middle" font-size="9" fill="white">问题分类</text>
  <rect x="420" y="415" width="70" height="24" rx="4" fill="#ca8a04"/><text x="455" y="432" text-anchor="middle" font-size="9" fill="white">条件分支</text>

  <rect x="100" y="448" width="70" height="24" rx="4" fill="#64748b"/><text x="135" y="465" text-anchor="middle" font-size="9" fill="white">变量赋值</text>
  <rect x="180" y="448" width="70" height="24" rx="4" fill="#059669"/><text x="215" y="465" text-anchor="middle" font-size="9" fill="white">代码执行</text>
  <rect x="260" y="448" width="70" height="24" rx="4" fill="#dc2626"/><text x="295" y="465" text-anchor="middle" font-size="9" fill="white">HTTP 请求</text>
  <rect x="340" y="448" width="70" height="24" rx="4" fill="#7c3aed"/><text x="375" y="465" text-anchor="middle" font-size="9" fill="white">迭代</text>
  <rect x="420" y="448" width="70" height="24" rx="4" fill="#475569"/><text x="455" y="465" text-anchor="middle" font-size="9" fill="white">结束</text>

  <text x="540" y="430" font-size="11" fill="#78716c">拖拽节点到画布</text>
  <text x="540" y="450" font-size="11" fill="#78716c">连接节点间流转</text>
  <text x="540" y="470" font-size="11" fill="#78716c">配置节点参数</text>

  <defs>
    <marker id="a3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
