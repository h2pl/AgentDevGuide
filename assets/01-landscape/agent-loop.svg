<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" font-family="sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F8FAFC"/><stop offset="100%" stop-color="#EFF6FF"/></linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>
    <linearGradient id="box1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#EFF6FF"/><stop offset="100%" stop-color="#DBEAFE"/></linearGradient>
    <linearGradient id="box2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F0FDF4"/><stop offset="100%" stop-color="#DCFCE7"/></linearGradient>
    <linearGradient id="box3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF7ED"/><stop offset="100%" stop-color="#FFEDD5"/></linearGradient>
    <linearGradient id="box4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FEF2F2"/><stop offset="100%" stop-color="#FEE2E2"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#2563EB"/></marker>
    <marker id="arrow-grey" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#94A3B8"/></marker>
  </defs>
  <rect width="680" height="480" fill="url(#bg)" rx="8"/>
  <rect x="0" y="0" width="680" height="44" fill="url(#header)" rx="8"/>
  <rect x="0" y="22" width="680" height="22" fill="url(#header)"/>
  <text x="340" y="28" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">Agent 循环：感知 → 推理 → 行动 → 反馈</text>

  <!-- 用户指令 -->
  <rect x="240" y="62" width="200" height="32" rx="16" fill="#2563EB" filter="url(#shadow)"/>
  <text x="340" y="82" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">用户指令</text>
  <line x1="340" y1="94" x2="340" y2="116" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 感知 -->
  <rect x="220" y="116" width="240" height="56" rx="8" fill="url(#box1)" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="220" y="116" width="8" height="56" rx="4" fill="#2563EB"/>
  <text x="244" y="138" fill="#1E293B" font-size="14" font-weight="bold">感知（Perception）</text>
  <text x="244" y="156" fill="#64748B" font-size="11">接收用户指令和环境输入</text>
  <line x1="340" y1="172" x2="340" y2="194" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 推理 -->
  <rect x="220" y="194" width="240" height="56" rx="8" fill="url(#box2)" stroke="#16A34A" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="220" y="194" width="8" height="56" rx="4" fill="#16A34A"/>
  <text x="244" y="216" fill="#1E293B" font-size="14" font-weight="bold">推理（Reasoning）</text>
  <text x="244" y="234" fill="#64748B" font-size="11">分析问题，制定行动计划</text>
  <line x1="340" y1="250" x2="340" y2="272" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 行动 -->
  <rect x="220" y="272" width="240" height="56" rx="8" fill="url(#box3)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="220" y="272" width="8" height="56" rx="4" fill="#D97706"/>
  <text x="244" y="294" fill="#1E293B" font-size="14" font-weight="bold">行动（Action）</text>
  <text x="244" y="312" fill="#64748B" font-size="11">调用工具执行操作</text>
  <line x1="340" y1="328" x2="340" y2="350" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 反馈 -->
  <rect x="220" y="350" width="240" height="56" rx="8" fill="url(#box4)" stroke="#DC2626" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="220" y="350" width="8" height="56" rx="4" fill="#DC2626"/>
  <text x="244" y="372" fill="#1E293B" font-size="14" font-weight="bold">反馈（Feedback）</text>
  <text x="244" y="390" fill="#64748B" font-size="11">观察结果，判断是否完成</text>

  <!-- 反馈循环箭头：反馈右侧 → 推理右侧 -->
  <path d="M 460 378 C 520 378, 520 222, 460 222" fill="none" stroke="#94A3B8" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arrow-grey)"/>
  <text x="540" y="305" fill="#94A3B8" font-size="11" font-style="italic">循环，直到任务完成</text>

  <!-- 完成箭头 -->
  <line x1="340" y1="406" x2="340" y2="432" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="280" y="432" width="120" height="28" rx="14" fill="#E2E8F0"/>
  <text x="340" y="450" text-anchor="middle" fill="#1E293B" font-size="12" font-weight="bold">最终回答</text>
</svg>