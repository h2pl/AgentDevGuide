<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" font-family="sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F8FAFC"/><stop offset="100%" stop-color="#EFF6FF"/></linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#64748B"/></marker>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F1F5F9"/><stop offset="100%" stop-color="#E2E8F0"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFBEB"/><stop offset="100%" stop-color="#FEF3C7"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ECFDF5"/><stop offset="100%" stop-color="#D1FAE5"/></linearGradient>
  </defs>
  <rect width="680" height="400" fill="url(#bg)" rx="8"/>
  <rect x="0" y="0" width="680" height="44" fill="url(#header)" rx="8"/>
  <rect x="0" y="22" width="680" height="22" fill="url(#header)"/>
  <text x="340" y="28" text-anchor="middle" fill="#fff" font-size="17" font-weight="bold">三种 AI 应用形态对比</text>

  <!-- Chatbot 列 -->
  <rect x="20" y="60" width="200" height="64" rx="8" fill="url(#g1)" stroke="#94A3B8" stroke-width="1" filter="url(#shadow)"/>
  <text x="120" y="82" text-anchor="middle" fill="#1E293B" font-size="15" font-weight="bold">Chatbot</text>
  <text x="120" y="100" text-anchor="middle" fill="#64748B" font-size="10">问答式：你问我答</text>
  <text x="120" y="114" text-anchor="middle" fill="#94A3B8" font-size="9">典型：ChatGPT 基础模式</text>

  <!-- Chatbot 流程 -->
  <rect x="36" y="148" width="68" height="34" rx="6" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1"/>
  <text x="70" y="169" text-anchor="middle" fill="#475569" font-size="11" font-weight="bold">用户</text>

  <line x1="104" y1="165" x2="124" y2="165" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="128" y="148" width="68" height="34" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="162" y="169" text-anchor="middle" fill="#2563EB" font-size="11" font-weight="bold">LLM</text>

  <line x1="196" y1="165" x2="216" y2="165" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="84" y="200" width="68" height="34" rx="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
  <text x="118" y="221" text-anchor="middle" fill="#475569" font-size="11" font-weight="bold">回复</text>

  <text x="120" y="268" text-anchor="middle" fill="#94A3B8" font-size="10">&#x2716; 无工具调用</text>
  <text x="120" y="284" text-anchor="middle" fill="#94A3B8" font-size="10">&#x2716; 无记忆</text>
  <text x="120" y="300" text-anchor="middle" fill="#94A3B8" font-size="10">&#x2716; 无自主决策</text>

  <!-- Workflow 列 -->
  <rect x="240" y="60" width="200" height="64" rx="8" fill="url(#g2)" stroke="#D97706" stroke-width="1" filter="url(#shadow)"/>
  <text x="340" y="82" text-anchor="middle" fill="#1E293B" font-size="15" font-weight="bold">Workflow</text>
  <text x="340" y="100" text-anchor="middle" fill="#64748B" font-size="10">流程式：预设步骤</text>
  <text x="340" y="114" text-anchor="middle" fill="#94A3B8" font-size="9">典型：Dify 固定工作流</text>

  <!-- Workflow 流程 -->
  <rect x="252" y="140" width="56" height="30" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="280" y="159" text-anchor="middle" fill="#92400E" font-size="10">步骤1</text>

  <line x1="308" y1="155" x2="322" y2="155" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="324" y="140" width="56" height="30" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="352" y="159" text-anchor="middle" fill="#92400E" font-size="10">步骤2</text>

  <line x1="380" y1="155" x2="394" y2="155" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="252" y="188" width="56" height="30" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="280" y="207" text-anchor="middle" fill="#2563EB" font-size="10">LLM</text>

  <line x1="308" y1="203" x2="322" y2="203" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="324" y="188" width="56" height="30" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="352" y="207" text-anchor="middle" fill="#92400E" font-size="10">步骤3</text>

  <line x1="380" y1="203" x2="394" y2="203" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="396" y="188" width="40" height="30" rx="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
  <text x="416" y="207" text-anchor="middle" fill="#475569" font-size="10">结果</text>

  <text x="340" y="256" text-anchor="middle" fill="#94A3B8" font-size="10">&#x2714; 稳定可控</text>
  <text x="340" y="272" text-anchor="middle" fill="#94A3B8" font-size="10">&#x2716; 步骤固定</text>
  <text x="340" y="288" text-anchor="middle" fill="#94A3B8" font-size="10">&#x2716; 无法应对变化</text>

  <!-- Agent 列 -->
  <rect x="460" y="60" width="200" height="64" rx="8" fill="url(#g3)" stroke="#16A34A" stroke-width="1" filter="url(#shadow)"/>
  <text x="560" y="82" text-anchor="middle" fill="#1E293B" font-size="15" font-weight="bold">Agent</text>
  <text x="560" y="100" text-anchor="middle" fill="#64748B" font-size="10">自主式：动态决策</text>
  <text x="560" y="114" text-anchor="middle" fill="#94A3B8" font-size="9">典型：自主 Agent 系统</text>

  <!-- Agent 流程：循环 -->
  <rect x="476" y="142" width="64" height="30" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="508" y="161" text-anchor="middle" fill="#2563EB" font-size="10">思考</text>

  <line x1="540" y1="157" x2="558" y2="157" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="560" y="142" width="64" height="30" rx="6" fill="#D1FAE5" stroke="#16A34A" stroke-width="1"/>
  <text x="592" y="161" text-anchor="middle" fill="#166534" font-size="10">工具</text>

  <line x1="560" y1="172" x2="542" y2="190" stroke="#16A34A" stroke-width="1.5"/>
  <line x1="540" y1="192" x2="508" y2="192" stroke="#16A34A" stroke-width="1.5"/>
  <line x1="508" y1="192" x2="508" y2="172" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="488" y="208" fill="#16A34A" font-size="9" font-style="italic">循环</text>

  <rect x="476" y="218" width="64" height="30" rx="6" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1"/>
  <text x="508" y="237" text-anchor="middle" fill="#475569" font-size="10">结果</text>

  <text x="560" y="256" text-anchor="middle" fill="#94A3B8" font-size="10">&#x2714; 动态决策</text>
  <text x="560" y="272" text-anchor="middle" fill="#94A3B8" font-size="10">&#x2714; 工具调用</text>
  <text x="560" y="288" text-anchor="middle" fill="#94A3B8" font-size="10">&#x2714; 自主规划</text>

  <!-- 底部标签 -->
  <rect x="160" y="330" width="360" height="36" rx="18" fill="#E2E8F0"/>
  <text x="340" y="353" text-anchor="middle" fill="#475569" font-size="12">Chatbot 回答问题 · Workflow 执行流程 · Agent 解决问题</text>
</svg>