<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
  </defs>
  <rect width="960" height="480" fill="#F8FAFC" rx="8" filter="url(#shadow)"/>
  <text x="480" y="35" font-family="PingFang SC, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1E293B" text-anchor="middle">MCP Inspector 调试界面</text>

  <!-- Browser mockup -->
  <rect x="40" y="55" width="880" height="410" rx="8" fill="#FFF" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Chrome bar -->
  <rect x="40" y="55" width="880" height="35" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <rect x="42" y="55" width="878" height="8" fill="#F1F5F9"/>
  <circle cx="60" cy="72" r="5" fill="#EF4444"/>
  <circle cx="78" cy="72" r="5" fill="#F59E0B"/>
  <circle cx="96" cy="72" r="5" fill="#10B981"/>
  <rect x="230" y="63" width="500" height="18" rx="9" fill="#FFF" stroke="#CBD5E1" stroke-width="1"/>
  <text x="480" y="76" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">http://localhost:5173</text>

  <!-- Left panel: Tools list -->
  <rect x="55" y="100" width="250" height="350" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="55" y="100" width="250" height="32" rx="6" fill="#2563EB"/>
  <text x="70" y="120" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF">📦 Tools</text>
  <text x="280" y="120" font-family="Segoe UI, sans-serif" font-size="10" fill="#93C5FD">2</text>

  <!-- Tool list items -->
  <rect x="65" y="142" width="230" height="36" rx="4" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="75" y="158" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1E40AF">add</text>
  <text x="75" y="172" font-family="Segoe UI, sans-serif" font-size="9" fill="#475569">两数相加</text>

  <rect x="65" y="186" width="230" height="36" rx="4" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="75" y="202" font-family="Segoe UI, sans-serif" font-size="12" fill="#475569">search_issues</text>
  <text x="75" y="216" font-family="Segoe UI, sans-serif" font-size="9" fill="#94A3B8">搜索 GitHub Issues</text>

  <rect x="65" y="230" width="230" height="36" rx="4" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="75" y="246" font-family="Segoe UI, sans-serif" font-size="12" fill="#475569">create_issue</text>
  <text x="75" y="260" font-family="Segoe UI, sans-serif" font-size="9" fill="#94A3B8">创建 GitHub Issue</text>

  <!-- Resources section -->
  <rect x="55" y="280" width="250" height="32" rx="6" fill="#D97706"/>
  <text x="70" y="300" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF">📄 Resources</text>
  <text x="280" y="300" font-family="Segoe UI, sans-serif" font-size="10" fill="#FDE68A">1</text>

  <rect x="65" y="320" width="230" height="30" rx="4" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="75" y="340" font-family="Segoe UI, sans-serif" font-size="11" fill="#475569">config://status</text>

  <!-- Prompts section -->
  <rect x="55" y="360" width="250" height="32" rx="6" fill="#059669"/>
  <text x="70" y="380" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF">💡 Prompts</text>
  <text x="280" y="380" font-family="Segoe UI, sans-serif" font-size="10" fill="#A7F3D0">2</text>

  <rect x="65" y="398" width="230" height="24" rx="4" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="75" y="415" font-family="Segoe UI, sans-serif" font-size="10" fill="#475569">analyze_sales</text>

  <!-- Right panel: Tool detail -->
  <rect x="320" y="100" width="585" height="200" rx="6" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="335" y="125" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1E293B">add</text>
  <text x="335" y="145" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" fill="#64748B">两数相加</text>

  <line x1="335" y1="155" x2="890" y2="155" stroke="#E2E8F0" stroke-width="1"/>

  <text x="335" y="175" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#475569">参数</text>

  <rect x="335" y="185" width="260" height="28" rx="4" fill="#F1F5F9"/>
  <text x="345" y="204" font-family="Segoe UI, sans-serif" font-size="11" fill="#475569">a: int</text>
  <rect x="610" y="185" width="120" height="28" rx="4" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="625" y="205" font-family="Segoe UI, sans-serif" font-size="11" fill="#94A3B8">输入 3</text>

  <rect x="335" y="220" width="260" height="28" rx="4" fill="#F1F5F9"/>
  <text x="345" y="239" font-family="Segoe UI, sans-serif" font-size="11" fill="#475569">b: int</text>
  <rect x="610" y="220" width="120" height="28" rx="4" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="625" y="240" font-family="Segoe UI, sans-serif" font-size="11" fill="#94A3B8">输入 5</text>

  <rect x="750" y="220" width="140" height="28" rx="6" fill="#2563EB"/>
  <text x="820" y="239" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">调用</text>

  <!-- JSON Response panel -->
  <rect x="320" y="315" width="585" height="135" rx="6" fill="#1E293B"/>
  <text x="335" y="338" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#94A3B8">响应</text>
  <text x="335" y="358" font-family="Segoe UI, sans-serif" font-size="11" fill="#A7F3D0">Request:</text>
  <text x="335" y="375" font-family="Segoe UI, sans-serif" font-size="10" fill="#CBD5E1">{ "method": "tools/call", "params": { "name": "add", "arguments": { "a": 3, "b": 5 } } }</text>
  <text x="335" y="398" font-family="Segoe UI, sans-serif" font-size="11" fill="#A7F3D0">Response:</text>
  <text x="335" y="415" font-family="Segoe UI, sans-serif" font-size="10" fill="#CBD5E1">{ "content": [ { "type": "text", "text": "8" } ] }</text>
  <text x="335" y="438" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748B">JSON-RPC 2.0 | 耗时 4ms | 状态 200</text>
</svg>