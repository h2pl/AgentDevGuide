<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.10"/></filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748B"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3B82F6"/>
    </marker>
  </defs>

  <rect width="960" height="520" rx="12" fill="#F8FAFC"/>
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">MCP 协议架构：Host → Client → Server → 外部工具</text>

  <!-- ===================== LEFT: Hosts ===================== -->
  <rect x="20" y="55" width="220" height="390" rx="10" fill="white" stroke="#BFDBFE" stroke-width="1.5" filter="url(#s)"/>
  <rect x="20" y="55" width="220" height="36" rx="10" fill="#DBEAFE"/>
  <rect x="20" y="81" width="220" height="10" fill="#DBEAFE"/>
  <text x="130" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#1D4ED8">Host（AI 客户端）</text>

  <!-- Claude -->
  <rect x="35" y="105" width="190" height="38" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="130" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">Claude Desktop</text>

  <!-- ChatGPT -->
  <rect x="35" y="152" width="190" height="38" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="130" y="175" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">ChatGPT / Cursor</text>

  <!-- Gemini -->
  <rect x="35" y="199" width="190" height="38" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="130" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">Gemini / VS Code</text>

  <!-- Windsurf/Zed -->
  <rect x="35" y="246" width="190" height="38" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="130" y="269" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">Windsurf / Zed ...</text>

  <!-- N clients -->
  <text x="130" y="310" text-anchor="middle" font-size="11" fill="#1D4ED8">N 个客户端</text>
  <text x="130" y="328" text-anchor="middle" font-size="10" fill="#64748B">各自有 Function Calling</text>
  <text x="130" y="343" text-anchor="middle" font-size="10" fill="#64748B">格式（不统一）</text>

  <!-- Problem label -->
  <rect x="35" y="365" width="190" height="60" rx="5" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="130" y="385" text-anchor="middle" font-size="11" fill="#DC2626" font-weight="bold">没有 MCP 之前：</text>
  <text x="130" y="403" text-anchor="middle" font-size="10" fill="#DC2626">每个客户端 × 每个工具</text>
  <text x="130" y="418" text-anchor="middle" font-size="10" fill="#DC2626">= N×M 套适配代码</text>

  <!-- Arrows from Host to MCP -->
  <line x1="240" y1="180" x2="290" y2="180" stroke="#3B82F6" stroke-width="2" marker-end="url(#arr-b)"/>
  <line x1="240" y1="220" x2="290" y2="220" stroke="#3B82F6" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- ===================== CENTER: MCP Protocol ===================== -->
  <rect x="295" y="55" width="370" height="390" rx="10" fill="white" stroke="#BBF7D0" stroke-width="1.5" filter="url(#s)"/>
  <rect x="295" y="55" width="370" height="36" rx="10" fill="#DCFCE7"/>
  <rect x="295" y="81" width="370" height="10" fill="#DCFCE7"/>
  <text x="480" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#15803D">MCP 协议层（JSON-RPC 2.0）</text>

  <!-- Client instances -->
  <rect x="315" y="105" width="150" height="85" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="390" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803D">MCP Client</text>
  <text x="390" y="145" text-anchor="middle" font-size="10" fill="#64748B">每个 Host 内部有</text>
  <text x="390" y="160" text-anchor="middle" font-size="10" fill="#64748B">1:1 的 Client 实例</text>
  <text x="390" y="180" text-anchor="middle" font-size="10" fill="#15803D">→ 转换平台格式</text>

  <!-- Transport -->
  <rect x="315" y="200" width="150" height="55" rx="6" fill="#ECFDF5"/>
  <text x="390" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">传输方式</text>
  <text x="390" y="236" text-anchor="middle" font-size="10" fill="#64748B">本地: STDIO</text>
  <text x="390" y="249" text-anchor="middle" font-size="10" fill="#64748B">远程: Streamable HTTP</text>

  <!-- Three primitives -->
  <rect x="490" y="105" width="155" height="150" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="567" y="125" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803D">三大原语</text>

  <rect x="500" y="135" width="135" height="30" rx="4" fill="#DCFCE7"/>
  <text x="567" y="155" text-anchor="middle" font-size="11" fill="#1E293B">Tools（可调用函数）</text>

  <rect x="500" y="172" width="135" height="30" rx="4" fill="#DCFCE7"/>
  <text x="567" y="192" text-anchor="middle" font-size="11" fill="#1E293B">Resources（只读数据）</text>

  <rect x="500" y="209" width="135" height="30" rx="4" fill="#DCFCE7"/>
  <text x="567" y="229" text-anchor="middle" font-size="11" fill="#1E293B">Prompts（模板）</text>

  <!-- Sampling & Roots -->
  <rect x="315" y="270" width="330" height="60" rx="6" fill="#F8FAFC"/>
  <text x="325" y="290" font-size="11" font-weight="bold" fill="#334155">关键设计：</text>
  <text x="325" y="308" font-size="10" fill="#64748B">• Sampling — Server 可请求 Client 代调 LLM</text>
  <text x="325" y="324" font-size="10" fill="#64748B">• Roots — Server 只能访问用户授权的资源路径</text>

  <!-- MCP value -->
  <rect x="315" y="345" width="330" height="80" rx="6" fill="#DCFCE7"/>
  <text x="480" y="365" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803D">MCP 的核心价值</text>
  <text x="480" y="385" text-anchor="middle" font-size="11" fill="#166534">N + M 套代码 替代 N × M 套适配</text>
  <text x="480" y="403" text-anchor="middle" font-size="11" fill="#166534">写一次 Server，任何 MCP 客户端都能用</text>
  <text x="480" y="418" text-anchor="middle" font-size="10" fill="#64748B">2026: 8000+ Server, 9700万/月 SDK 下载</text>

  <!-- Arrows from MCP to Servers -->
  <line x1="665" y1="180" x2="715" y2="180" stroke="#22C55E" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="665" y1="220" x2="715" y2="220" stroke="#22C55E" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== RIGHT: MCP Servers ===================== -->
  <rect x="720" y="55" width="220" height="390" rx="10" fill="white" stroke="#E9D5FF" stroke-width="1.5" filter="url(#s)"/>
  <rect x="720" y="55" width="220" height="36" rx="10" fill="#F3E8FF"/>
  <rect x="720" y="81" width="220" height="10" fill="#F3E8FF"/>
  <text x="830" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#7C3AED">MCP Servers</text>

  <!-- GitHub -->
  <rect x="735" y="105" width="190" height="38" rx="6" fill="#FAF5FF" stroke="#D8B4FE" stroke-width="1"/>
  <text x="830" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">GitHub Server</text>

  <!-- Postgres -->
  <rect x="735" y="152" width="190" height="38" rx="6" fill="#FAF5FF" stroke="#D8B4FE" stroke-width="1"/>
  <text x="830" y="175" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">Postgres Server</text>

  <!-- Slack -->
  <rect x="735" y="199" width="190" height="38" rx="6" fill="#FAF5FF" stroke="#D8B4FE" stroke-width="1"/>
  <text x="830" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">Slack / Notion Server</text>

  <!-- Stripe -->
  <rect x="735" y="246" width="190" height="38" rx="6" fill="#FAF5FF" stroke="#D8B4FE" stroke-width="1"/>
  <text x="830" y="269" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E293B">Stripe / AWS Server</text>

  <!-- M servers -->
  <text x="830" y="310" text-anchor="middle" font-size="11" fill="#7C3AED">M 个工具/数据源</text>
  <text x="830" y="328" text-anchor="middle" font-size="10" fill="#64748B">每个 Server 只需写一次</text>
  <text x="830" y="343" text-anchor="middle" font-size="10" fill="#64748B">标准 JSON-RPC 接口</text>

  <!-- Production note -->
  <rect x="735" y="365" width="190" height="60" rx="5" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1"/>
  <text x="830" y="385" text-anchor="middle" font-size="11" fill="#92400E" font-weight="bold">生产 Server 需要：</text>
  <text x="830" y="403" text-anchor="middle" font-size="10" fill="#9A3412">OAuth 2.1 / 输入验证</text>
  <text x="830" y="418" text-anchor="middle" font-size="10" fill="#9A3412">错误处理 / Gateway 层</text>

  <!-- Bottom: comparison -->
  <rect x="20" y="455" width="920" height="50" rx="8" fill="#F1F5F9"/>
  <text x="180" y="485" text-anchor="middle" font-size="12" fill="#DC2626">❌ 之前：N×M 套适配（每个客户端格式不同，重复劳动）</text>
  <text x="660" y="485" text-anchor="middle" font-size="12" fill="#15803D">✅ 之后：N+M 套代码（统一协议，一次编写处处复用）</text>
  <line x1="400" y1="462" x2="400" y2="498" stroke="#E2E8F0" stroke-width="1"/>

</svg>