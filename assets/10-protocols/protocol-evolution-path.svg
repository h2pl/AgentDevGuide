<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" width="960" height="460">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="960" height="460" fill="#F8FAFC" rx="8" filter="url(#shadow)"/>
  <text x="480" y="38" font-family="PingFang SC, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1E293B" text-anchor="middle">协议采纳不应超前于业务阶段</text>
  <text x="480" y="62" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" fill="#64748B" text-anchor="middle">按业务需求逐步引入协议，不要一次性设计"完美协议栈"</text>

  <!-- Phase 1 -->
  <rect x="40" y="90" width="200" height="45" rx="8" fill="#2563EB"/>
  <text x="140" y="117" font-family="Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#FFF" text-anchor="middle">Phase 1: 工具接入</text>

  <rect x="40" y="145" width="200" height="80" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="60" y="168" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1E40AF">MCP 仅此而已</text>
  <text x="60" y="188" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">12 行 Python 启动</text>
  <text x="60" y="206" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">0 依赖，1-2 天交付</text>

  <line x1="240" y1="135" x2="290" y2="135" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 2 -->
  <rect x="300" y="90" width="200" height="45" rx="8" fill="#D97706"/>
  <text x="400" y="117" font-family="Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#FFF" text-anchor="middle">Phase 2: 多 Agent</text>

  <rect x="300" y="145" width="200" height="80" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="320" y="168" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#92400E">MCP + A2A</text>
  <text x="320" y="188" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">Agent Card 能力声明</text>
  <text x="320" y="206" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">任务委托与生命周期</text>

  <line x1="500" y1="135" x2="550" y2="135" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 3 -->
  <rect x="560" y="90" width="200" height="45" rx="8" fill="#059669"/>
  <text x="660" y="117" font-family="Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#FFF" text-anchor="middle">Phase 3: 前端交互</text>

  <rect x="560" y="145" width="200" height="80" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="580" y="168" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#065F46">MCP + A2A + AG-UI</text>
  <text x="580" y="188" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">实时流式渲染</text>
  <text x="580" y="206" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">组件级解耦</text>

  <line x1="760" y1="135" x2="810" y2="135" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 4 -->
  <rect x="820" y="90" width="120" height="45" rx="8" fill="#7C3AED"/>
  <text x="880" y="117" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">Phase 4</text>

  <rect x="820" y="145" width="120" height="80" rx="6" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="835" y="168" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#5B21B6">全栈</text>
  <text x="835" y="188" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#475569">跨组织商业</text>
  <text x="835" y="206" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#475569">&lt;1% 团队</text>

  <!-- Bottom adoption stats -->
  <rect x="40" y="260" width="880" height="180" rx="8" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="480" y="290" font-family="PingFang SC, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#1E293B" text-anchor="middle">实际采纳率</text>

  <!-- Phase 1 block -->
  <rect x="60" y="310" width="200" height="45" rx="6" fill="#DBEAFE"/>
  <text x="85" y="327" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1E40AF">Phase 1: 只用 MCP</text>
  <text x="85" y="345" font-family="Segoe UI, sans-serif" font-size="11" fill="#1E40AF">~90% 团队</text>

  <rect x="60" y="365" width="200" height="60" rx="6" fill="#F8FAFC" stroke="#DBEAFE" stroke-width="1"/>
  <text x="75" y="385" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#475569">最佳起点：零依赖</text>
  <text x="75" y="402" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#475569">1-2 天可交付 MVP</text>

  <rect x="280" y="310" width="200" height="45" rx="6" fill="#FEF3C7"/>
  <text x="305" y="327" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#92400E">Phase 2: MCP + A2A</text>
  <text x="305" y="345" font-family="Segoe UI, sans-serif" font-size="11" fill="#92400E">~30% 团队</text>

  <rect x="280" y="365" width="200" height="60" rx="6" fill="#F8FAFC" stroke="#FEF3C7" stroke-width="1"/>
  <text x="295" y="385" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#475569">企业多 Agent 协作</text>
  <text x="295" y="402" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#475569">需单体 Agent 验证可行</text>

  <rect x="500" y="310" width="200" height="45" rx="6" fill="#D1FAE5"/>
  <text x="525" y="327" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#065F46">Phase 3: 加 AG-UI</text>
  <text x="525" y="345" font-family="Segoe UI, sans-serif" font-size="11" fill="#065F46">~10% 团队</text>

  <rect x="500" y="365" width="200" height="60" rx="6" fill="#F8FAFC" stroke="#D1FAE5" stroke-width="1"/>
  <text x="515" y="385" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#475569">富前端实时交互</text>
  <text x="515" y="402" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#475569">需要已有前端应用</text>

  <rect x="720" y="310" width="180" height="45" rx="6" fill="#EDE9FE"/>
  <text x="745" y="327" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#5B21B6">Phase 4: 全栈</text>
  <text x="745" y="345" font-family="Segoe UI, sans-serif" font-size="11" fill="#5B21B6">&lt;1% 团队</text>

  <rect x="720" y="365" width="180" height="60" rx="6" fill="#F8FAFC" stroke="#EDE9FE" stroke-width="1"/>
  <text x="735" y="385" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#475569">跨组织商业交易</text>
  <text x="735" y="402" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#475569">前沿团队试点中</text>
</svg>