<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="960" height="440">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="960" height="440" fill="#F8FAFC" rx="8" filter="url(#shadow)"/>
  <text x="480" y="38" font-family="PingFang SC, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1E293B" text-anchor="middle">多 Agent 协作系统架构</text>

  <!-- User -->
  <rect x="380" y="65" width="200" height="40" rx="20" fill="#1E293B"/>
  <text x="480" y="90" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#FFF" text-anchor="middle">用户请求</text>

  <line x1="480" y1="105" x2="480" y2="130" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Orchestrator -->
  <rect x="330" y="135" width="300" height="55" rx="8" fill="#2563EB"/>
  <text x="480" y="160" font-family="Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#FFF" text-anchor="middle">主 Agent（Orchestrator）</text>
  <text x="480" y="180" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#DBEAFE" text-anchor="middle">接收请求，拆解任务，分发与汇总</text>

  <!-- Arrows to sub-agents -->
  <line x1="330" y1="162" x2="210" y2="220" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="190" x2="480" y2="220" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="630" y1="162" x2="750" y2="220" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step labels on arrows -->
  <text x="250" y="185" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#2563EB">① 搜索请求</text>
  <text x="490" y="210" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#2563EB">② 分析请求</text>
  <text x="660" y="185" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#2563EB">③ 报表请求</text>

  <!-- Sub Agent 1: Search -->
  <rect x="80" y="225" width="260" height="100" rx="8" fill="#FFF" stroke="#D97706" stroke-width="1.5"/>
  <rect x="80" y="225" width="260" height="30" rx="8" fill="#D97706"/>
  <text x="210" y="245" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">搜索 Agent</text>
  <text x="100" y="275" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" fill="#475569">能力：网络搜索 · 文档检索</text>
  <text x="100" y="295" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" fill="#475569">端口：localhost:9001</text>
  <text x="100" y="315" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" fill="#475569">模式：同步</text>

  <!-- Sub Agent 2: Analysis -->
  <rect x="350" y="225" width="260" height="100" rx="8" fill="#FFF" stroke="#059669" stroke-width="1.5"/>
  <rect x="350" y="225" width="260" height="30" rx="8" fill="#059669"/>
  <text x="480" y="245" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">分析 Agent</text>
  <text x="370" y="275" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" fill="#475569">能力：数据查询 · 趋势分析</text>
  <text x="370" y="295" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" fill="#475569">端口：localhost:9002</text>
  <text x="370" y="315" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" fill="#475569">模式：流式</text>

  <!-- Sub Agent 3: Report -->
  <rect x="620" y="225" width="260" height="100" rx="8" fill="#FFF" stroke="#7C3AED" stroke-width="1.5"/>
  <rect x="620" y="225" width="260" height="30" rx="8" fill="#7C3AED"/>
  <text x="750" y="245" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">报表 Agent</text>
  <text x="640" y="275" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" fill="#475569">能力：Markdown 报表 · 格式化</text>
  <text x="640" y="295" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" fill="#475569">端口：localhost:9003</text>
  <text x="640" y="315" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" fill="#475569">模式：异步</text>

  <!-- Return arrows -->
  <line x1="210" y1="325" x2="400" y2="370" stroke="#64748B" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="480" y1="325" x2="480" y2="370" stroke="#64748B" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="750" y1="325" x2="560" y2="370" stroke="#64748B" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Return to orchestrator -->
  <rect x="330" y="365" width="300" height="40" rx="8" fill="#E0E7FF" stroke="#6366F1" stroke-width="1"/>
  <text x="480" y="390" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#4338CA" text-anchor="middle">主 Agent 汇总三个子 Agent 的结果</text>

  <!-- Final output -->
  <line x1="480" y1="405" x2="480" y2="420" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="380" y="400" width="200" height="30" rx="15" fill="#059669"/>
  <text x="480" y="420" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">返回整合结果给用户</text>
</svg>