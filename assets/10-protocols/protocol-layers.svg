<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="960" height="500">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
  </defs>
  <rect width="960" height="500" fill="#F8FAFC" rx="8" filter="url(#shadow)"/>
  <text x="480" y="38" font-family="PingFang SC, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1E293B" text-anchor="middle">Agent 协议分层模型</text>

  <!-- Layer 4: Business -->
  <rect x="120" y="60" width="720" height="70" rx="8" fill="#E2E8F0"/>
  <rect x="120" y="60" width="720" height="70" rx="8" fill="#7C3AED" opacity="0.15"/>
  <text x="160" y="100" font-family="PingFang SC, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#5B21B6">商业与契约层</text>
  <text x="340" y="100" font-family="Segoe UI, PingFang SC, sans-serif" font-size="13" fill="#6D28D9">OAP / UCP / AP2</text>
  <text x="160" y="120" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#4C1D95">跨组织商业：身份，计费，审计，合规，L0-L5 合规模型</text>

  <!-- Layer 3: Interaction -->
  <rect x="120" y="145" width="720" height="70" rx="8" fill="#E2E8F0"/>
  <rect x="120" y="145" width="720" height="70" rx="8" fill="#D97706" opacity="0.12"/>
  <text x="160" y="185" font-family="PingFang SC, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#92400E">交互层</text>
  <text x="340" y="185" font-family="Segoe UI, PingFang SC, sans-serif" font-size="13" fill="#92400E">AG-UI / A2UI</text>
  <text x="160" y="205" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#78350F">Agent 输出标准化：实时流式渲染到前端，解耦 Agent 与 UI</text>

  <!-- Layer 2: Horizontal -->
  <rect x="120" y="230" width="720" height="70" rx="8" fill="#E2E8F0"/>
  <rect x="120" y="230" width="720" height="70" rx="8" fill="#059669" opacity="0.12"/>
  <text x="160" y="270" font-family="PingFang SC, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#065F46">水平层</text>
  <text x="340" y="270" font-family="Segoe UI, PingFang SC, sans-serif" font-size="13" fill="#065F46">A2A / ACP（已并入A2A）/ ANP</text>
  <text x="160" y="290" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#064E3B">Agent 间通信：任务委托，多 Agent 协作，去中心化发现与身份</text>

  <!-- Layer 1: Vertical -->
  <rect x="120" y="315" width="720" height="70" rx="8" fill="#E2E8F0"/>
  <rect x="120" y="315" width="720" height="70" rx="8" fill="#2563EB" opacity="0.12"/>
  <text x="160" y="355" font-family="PingFang SC, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#1E40AF">垂直层</text>
  <text x="340" y="355" font-family="Segoe UI, PingFang SC, sans-serif" font-size="13" fill="#1E40AF">MCP</text>
  <text x="160" y="375" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#1E3A5F">Agent 连接工具：工具调用标准化，写一次处处运行</text>

  <!-- Agent on top -->
  <rect x="340" y="405" width="280" height="40" rx="20" fill="#2563EB"/>
  <text x="480" y="430" font-family="PingFang SC, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#FFF" text-anchor="middle">Agent</text>

  <!-- Arrows -->
  <line x1="480" y1="445" x2="480" y2="130" stroke="#94A3B8" stroke-width="2" opacity="0.3"/>
  <line x1="480" y1="445" x2="480" y2="385" stroke="#94A3B8" stroke-width="2" opacity="0.3"/>

  <!-- Arrow down to tools -->
  <line x1="480" y1="385" x2="480" y2="460" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Side annotation -->
  <text x="620" y="440" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" fill="#64748B">工具 / API / 数据库 / 文件系统</text>
</svg>