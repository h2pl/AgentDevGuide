<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
    <marker id="arrow-down" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="960" height="480" fill="#F8FAFC" rx="8" filter="url(#shadow)"/>
  <text x="480" y="38" font-family="PingFang SC, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1E293B" text-anchor="middle">协议选型决策树</text>

  <!-- Root question -->
  <rect x="330" y="60" width="300" height="36" rx="18" fill="#1E293B"/>
  <text x="480" y="84" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">你的 Agent 需要什么？</text>

  <!-- Arrow down -->
  <line x1="480" y1="96" x2="480" y2="112" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- Question 1 -->
  <rect x="355" y="115" width="250" height="30" rx="15" fill="#2563EB"/>
  <text x="480" y="135" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">调用外部工具？</text>

  <!-- Yes/No arrows -->
  <line x1="355" y1="130" x2="180" y2="170" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-down)"/>
  <line x1="605" y1="130" x2="780" y2="170" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <text x="270" y="148" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#2563EB">Yes</text>
  <text x="700" y="148" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#64748B">No</text>

  <!-- Yes: MCP -->
  <rect x="80" y="175" width="200" height="40" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="180" y="200" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1E40AF" text-anchor="middle">MCP（必选）</text>

  <!-- Yes arrow down -->
  <line x1="180" y1="215" x2="180" y2="240" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <!-- Question 2a -->
  <rect x="55" y="245" width="250" height="30" rx="15" fill="#D97706"/>
  <text x="180" y="265" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">多 Agent 通信？</text>

  <!-- 2a arrows -->
  <line x1="180" y1="275" x2="180" y2="305" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow-down)"/>
  <line x1="305" y1="260" x2="780" y2="260" stroke="#64748B" stroke-width="1.5" stroke-dasharray="5,3"/>

  <text x="540" y="255" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#64748B">跳过</text>

  <!-- No branch: already MCP only, skip question 2a -->
  <rect x="580" y="245" width="200" height="30" rx="15" fill="#94A3B8"/>
  <text x="680" y="265" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">跳过</text>

  <!-- 2a Yes outcomes -->
  <rect x="55" y="310" width="250" height="55" rx="6" fill="#FEF3C7"/>
  <text x="70" y="330" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#92400E">企业内协作 → A2A</text>
  <text x="70" y="352" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">MCP + A2A，成熟度最高</text>

  <line x1="180" y1="365" x2="180" y2="385" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <rect x="55" y="390" width="250" height="45" rx="6" fill="#FFEDD5"/>
  <text x="70" y="410" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#92400E">跨企业 → A2A + ANP</text>
  <text x="70" y="425" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#475569">ANP 做身份发现，A2A 做任务委托</text>

  <!-- Question 3 -->
  <line x1="680" y1="275" x2="680" y2="300" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <rect x="555" y="305" width="250" height="30" rx="15" fill="#059669"/>
  <text x="680" y="325" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">前端实时交互？</text>

  <!-- 3a arrows -->
  <line x1="680" y1="335" x2="680" y2="360" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <rect x="555" y="365" width="250" height="40" rx="6" fill="#D1FAE5"/>
  <text x="570" y="385" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#065F46">AG-UI / A2UI</text>
  <text x="570" y="400" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#475569">Agent 输出流式到前端</text>

  <!-- Question 4 -->
  <line x1="680" y1="405" x2="680" y2="425" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-down)"/>

  <rect x="555" y="430" width="250" height="30" rx="15" fill="#7C3AED"/>
  <text x="680" y="450" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">商业交易？→ 关注 OAP</text>
</svg>