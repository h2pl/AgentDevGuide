<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" width="960" height="400">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="960" height="400" fill="#F8FAFC" rx="8" filter="url(#shadow)"/>
  <text x="480" y="38" font-family="PingFang SC, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1E293B" text-anchor="middle">AG-UI 让 Agent 输出与前端解耦</text>

  <!-- Without AG-UI -->
  <rect x="40" y="70" width="410" height="140" rx="8" fill="#FFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="245" y="98" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#EF4444" text-anchor="middle">无 AG-UI：耦合模式</text>

  <rect x="60" y="115" width="120" height="30" rx="6" fill="#2563EB"/>
  <text x="120" y="135" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">Agent A</text>

  <line x1="180" y1="130" x2="210" y2="130" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="215" y="115" width="120" height="30" rx="6" fill="#94A3B8"/>
  <text x="275" y="135" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">定制渲染 A</text>

  <rect x="60" y="160" width="120" height="30" rx="6" fill="#D97706"/>
  <text x="120" y="180" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">Agent B</text>

  <line x1="180" y1="175" x2="210" y2="175" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="215" y="160" width="120" height="30" rx="6" fill="#94A3B8"/>
  <text x="275" y="180" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">定制渲染 B</text>

  <text x="270" y="200" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#EF4444" text-anchor="middle">每个 Agent 一套定制前端</text>

  <!-- Arrow between -->
  <line x1="450" y1="140" x2="485" y2="140" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- With AG-UI -->
  <rect x="510" y="70" width="410" height="140" rx="8" fill="#FFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="715" y="98" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#059669" text-anchor="middle">有 AG-UI：解耦模式</text>

  <rect x="530" y="115" width="120" height="30" rx="6" fill="#2563EB"/>
  <text x="590" y="135" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">Agent A</text>

  <rect x="530" y="160" width="120" height="30" rx="6" fill="#D97706"/>
  <text x="590" y="180" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">Agent B</text>

  <line x1="650" y1="130" x2="690" y2="130" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="650" y1="175" x2="690" y2="175" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AG-UI layer -->
  <rect x="695" y="110" width="100" height="60" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="745" y="135" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#065F46" text-anchor="middle">AG-UI</text>
  <text x="745" y="155" font-family="PingFang SC, Segoe UI, sans-serif" font-size="9" fill="#065F46" text-anchor="middle">事件流</text>

  <line x1="795" y1="140" x2="830" y2="140" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Frontend -->
  <rect x="835" y="115" width="70" height="50" rx="6" fill="#6366F1"/>
  <text x="870" y="145" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">前端</text>

  <!-- Bottom explanation -->
  <rect x="40" y="240" width="880" height="140" rx="8" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="480" y="268" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1E293B" text-anchor="middle">AG-UI 事件流格式（示例）</text>

  <rect x="60" y="285" width="840" height="25" rx="4" fill="#F1F5F9"/>
  <text x="75" y="302" font-family="Segoe UI, sans-serif" font-size="11" fill="#475569">Agent 输出 →</text>

  <rect x="175" y="285" width="140" height="25" rx="4" fill="#DBEAFE"/>
  <text x="190" y="302" font-family="Segoe UI, sans-serif" font-size="11" fill="#1E40AF">{"type": "text_chunk"}</text>

  <rect x="325" y="285" width="140" height="25" rx="4" fill="#D1FAE5"/>
  <text x="340" y="302" font-family="Segoe UI, sans-serif" font-size="11" fill="#065F46">{"type": "card"}</text>

  <rect x="475" y="285" width="140" height="25" rx="4" fill="#FEF3C7"/>
  <text x="490" y="302" font-family="Segoe UI, sans-serif" font-size="11" fill="#92400E">{"type": "chart"}</text>

  <rect x="625" y="285" width="140" height="25" rx="4" fill="#EDE9FE"/>
  <text x="640" y="302" font-family="Segoe UI, sans-serif" font-size="11" fill="#5B21B6">{"type": "form"}</text>

  <rect x="775" y="285" width="125" height="25" rx="4" fill="#FCE7F3"/>
  <text x="790" y="302" font-family="Segoe UI, sans-serif" font-size="11" fill="#BE185D">{"type": "confirm"}</text>

  <text x="480" y="340" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">前端按事件类型渲染对应组件，无需为每个 Agent 写适配层</text>
  <text x="480" y="360" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">当前生态：CopilotKit（AG-UI）/ Google ADK（A2UI），尚未收敛</text>
</svg>