<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="s4" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="880" height="500" fill="url(#bg4)" rx="12"/>

  <!-- Part 1: Handoff -->
  <text x="220" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">OpenAI Agents SDK — Handoff 模式</text>
  <text x="220" y="50" text-anchor="middle" font-size="11" fill="#78716c">Agent 将对话移交给另一个 Agent，各司其职</text>

  <!-- User -->
  <rect x="30" y="80" width="80" height="44" rx="22" fill="#f97316" filter="url(#s4)"/>
  <text x="70" y="100" text-anchor="middle" font-size="12" fill="white" font-weight="600">👤 用户</text>
  <text x="70" y="115" text-anchor="middle" font-size="9" fill="#fed7aa">"你好"</text>

  <!-- Arrow to Router -->
  <line x1="110" y1="102" x2="155" y2="102" stroke="#94a3b8" stroke-width="2" marker-end="url(#a4)"/>

  <!-- Router Agent -->
  <rect x="160" y="75" width="120" height="55" rx="8" fill="#2563eb" filter="url(#s4)"/>
  <text x="220" y="97" text-anchor="middle" font-size="12" fill="white" font-weight="600">🔀 路由 Agent</text>
  <text x="220" y="115" text-anchor="middle" font-size="9" fill="#bfdbfe">判断语言 → 分发</text>

  <!-- Branch to Chinese -->
  <line x1="220" y1="130" x2="220" y2="160" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="220" y1="160" x2="120" y2="160" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="220" y1="160" x2="320" y2="160" stroke="#94a3b8" stroke-width="1.5"/>

  <text x="165" y="155" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">中文</text>
  <text x="275" y="155" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">English</text>

  <!-- Chinese Agent -->
  <rect x="50" y="165" width="140" height="50" rx="8" fill="#059669" filter="url(#s4)"/>
  <text x="120" y="187" text-anchor="middle" font-size="11" fill="white" font-weight="600">🇨🇳 中文助手</text>
  <text x="120" y="203" text-anchor="middle" font-size="9" fill="#a7f3d0">用中文回答问题</text>

  <!-- English Agent -->
  <rect x="250" y="165" width="140" height="50" rx="8" fill="#7c3aed" filter="url(#s4)"/>
  <text x="320" y="187" text-anchor="middle" font-size="11" fill="white" font-weight="600">🇬🇧 English Agent</text>
  <text x="320" y="203" text-anchor="middle" font-size="9" fill="#ddd6fe">Answer in English</text>

  <!-- Arrow back -->
  <line x1="120" y1="215" x2="120" y2="245" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a4)"/>
  <line x1="320" y1="215" x2="320" y2="245" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a4)"/>

  <!-- Output -->
  <rect x="100" y="248" width="240" height="35" rx="6" fill="#64748b" filter="url(#s4)"/>
  <text x="220" y="270" text-anchor="middle" font-size="11" fill="white" font-weight="500">📤 结构化输出（含 handoff 历史）</text>

  <!-- Part 2: A2A Protocol -->
  <text x="660" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Google ADK — A2A 协议</text>
  <text x="660" y="50" text-anchor="middle" font-size="11" fill="#78716c">跨框架 Agent 互联：发现、委派、同步</text>

  <!-- Agent A -->
  <rect x="460" y="80" width="130" height="60" rx="10" fill="#2563eb" filter="url(#s4)"/>
  <text x="525" y="105" text-anchor="middle" font-size="12" fill="white" font-weight="600">Agent A</text>
  <text x="525" y="122" text-anchor="middle" font-size="10" fill="#bfdbfe">LangGraph 框架</text>

  <!-- A2A Protocol -->
  <rect x="610" y="80" width="100" height="60" rx="10" fill="#f59e0b" filter="url(#s4)"/>
  <text x="660" y="105" text-anchor="middle" font-size="12" fill="white" font-weight="700">A2A</text>
  <text x="660" y="122" text-anchor="middle" font-size="9" fill="#fef3c7">开放协议</text>

  <!-- Agent B -->
  <rect x="720" y="80" width="130" height="60" rx="10" fill="#059669" filter="url(#s4)"/>
  <text x="785" y="105" text-anchor="middle" font-size="12" fill="white" font-weight="600">Agent B</text>
  <text x="785" y="122" text-anchor="middle" font-size="10" fill="#a7f3d0">Google ADK 框架</text>

  <!-- Bidirectional arrows -->
  <line x1="590" y1="110" x2="610" y2="110" stroke="#f59e0b" stroke-width="2" marker-end="url(#a4b)"/>
  <line x1="710" y1="110" x2="720" y2="110" stroke="#f59e0b" stroke-width="2" marker-end="url(#a4b)"/>

  <!-- A2A Steps -->
  <rect x="480" y="165" width="370" height="160" rx="8" fill="white" opacity="0.85" filter="url(#s4)"/>
  <text x="500" y="190" font-size="12" font-weight="600" fill="#1e293b">A2A 三大核心能力</text>

  <rect x="500" y="200" width="24" height="24" rx="4" fill="#2563eb"/>
  <text x="512" y="217" text-anchor="middle" font-size="11" fill="white" font-weight="700">1</text>
  <text x="535" y="217" font-size="11" fill="#1e293b" font-weight="600">Agent 发现</text>
  <text x="535" y="233" font-size="10" fill="#64748b">自动发现其他 Agent 的能力和接口</text>

  <rect x="500" y="245" width="24" height="24" rx="4" fill="#7c3aed"/>
  <text x="512" y="262" text-anchor="middle" font-size="11" fill="white" font-weight="700">2</text>
  <text x="535" y="262" font-size="11" fill="#1e293b" font-weight="600">任务委派</text>
  <text x="535" y="278" font-size="10" fill="#64748b">将子任务委派给最合适的 Agent 执行</text>

  <rect x="500" y="290" width="24" height="24" rx="4" fill="#059669"/>
  <text x="512" y="307" text-anchor="middle" font-size="11" fill="white" font-weight="700">3</text>
  <text x="535" y="307" font-size="11" fill="#1e293b" font-weight="600">状态同步</text>
  <text x="535" y="323" font-size="10" fill="#64748b">跨 Agent 同步任务状态和执行进度</text>

  <!-- Comparison Table -->
  <rect x="480" y="350" width="370" height="130" rx="8" fill="white" opacity="0.85" filter="url(#s4)"/>
  <text x="500" y="375" font-size="12" font-weight="600" fill="#1e293b">Handoff vs A2A</text>

  <rect x="500" y="385" width="80" height="22" rx="4" fill="#2563eb"/>
  <text x="540" y="400" text-anchor="middle" font-size="10" fill="white" font-weight="600">Handoff</text>
  <text x="590" y="400" font-size="10" fill="#64748b">同框架内 Agent 移交</text>

  <rect x="500" y="415" width="80" height="22" rx="4" fill="#f59e0b"/>
  <text x="540" y="430" text-anchor="middle" font-size="10" fill="white" font-weight="600">A2A</text>
  <text x="590" y="430" font-size="10" fill="#64748b">跨框架 Agent 互联</text>

  <text x="500" y="460" font-size="10" fill="#78716c">OpenAI SDK 用 Handoff，Google ADK 用 A2A</text>
  <text x="500" y="475" font-size="10" fill="#78716c">两者不冲突，可以互补使用</text>

  <defs>
    <marker id="a4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="a4b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
