<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" width="960" height="460">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="960" height="460" fill="#F8FAFC" rx="8" filter="url(#shadow)"/>
  <text x="480" y="35" font-family="PingFang SC, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1E293B" text-anchor="middle">四种多 Agent 架构模式</text>

  <!-- Pattern 1: Orchestrator/Worker -->
  <rect x="30" y="60" width="210" height="170" rx="8" fill="#FFF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="135" y="85" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1E40AF" text-anchor="middle">Orchestrator/Worker</text>

  <rect x="90" y="95" width="90" height="28" rx="6" fill="#2563EB"/>
  <text x="135" y="114" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#FFF" text-anchor="middle">Orchestrator</text>

  <line x1="135" y1="123" x2="135" y2="135" stroke="#64748B" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="60" y1="135" x2="135" y2="135" stroke="#64748B" stroke-width="0.5"/>
  <line x1="135" y1="135" x2="210" y2="135" stroke="#64748B" stroke-width="0.5"/>

  <rect x="45" y="138" width="80" height="24" rx="4" fill="#DBEAFE"/>
  <text x="85" y="154" font-family="Segoe UI, sans-serif" font-size="10" fill="#1E40AF" text-anchor="middle">Worker A</text>
  <rect x="95" y="138" width="80" height="24" rx="4" fill="#DBEAFE"/>
  <text x="135" y="154" font-family="Segoe UI, sans-serif" font-size="10" fill="#1E40AF" text-anchor="middle">Worker B</text>
  <rect x="145" y="138" width="80" height="24" rx="4" fill="#DBEAFE"/>
  <text x="185" y="154" font-family="Segoe UI, sans-serif" font-size="10" fill="#1E40AF" text-anchor="middle">Worker C</text>

  <text x="135" y="195" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">CEO + 部门 / 主从协作</text>
  <text x="135" y="215" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">最常用，80% 场景覆盖</text>

  <!-- Pattern 2: Supervisor -->
  <rect x="260" y="60" width="210" height="170" rx="8" fill="#FFF" stroke="#D97706" stroke-width="1.5"/>
  <text x="365" y="85" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#92400E" text-anchor="middle">Supervisor</text>

  <rect x="330" y="95" width="70" height="28" rx="6" fill="#D97706"/>
  <text x="365" y="114" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#FFF" text-anchor="middle">Supervisor</text>

  <line x1="365" y1="123" x2="365" y2="140" stroke="#64748B" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="365" y1="140" x2="365" y2="175" stroke="#D97706" stroke-width="1"/>
  <line x1="365" y1="175" x2="365" y2="140" stroke="#D97706" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="325" y="143" width="80" height="24" rx="4" fill="#FEF3C7"/>
  <text x="365" y="159" font-family="Segoe UI, sans-serif" font-size="10" fill="#92400E" text-anchor="middle">Worker</text>

  <text x="365" y="195" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">主编 + 记者 / 质量控制</text>
  <text x="365" y="215" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">质量要求高时加一层</text>

  <!-- Pattern 3: Peer-to-Peer -->
  <rect x="490" y="60" width="210" height="170" rx="8" fill="#FFF" stroke="#059669" stroke-width="1.5"/>
  <text x="595" y="85" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#065F46" text-anchor="middle">Peer-to-Peer</text>

  <circle cx="555" cy="128" r="20" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="555" y="133" font-family="Segoe UI, sans-serif" font-size="10" fill="#065F46" text-anchor="middle">A</text>
  <circle cx="635" cy="128" r="20" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="635" y="133" font-family="Segoe UI, sans-serif" font-size="10" fill="#065F46" text-anchor="middle">B</text>
  <circle cx="595" cy="170" r="20" fill="#D1FAE5" stroke="#059669" stroke-width="1"/>
  <text x="595" y="175" font-family="Segoe UI, sans-serif" font-size="10" fill="#065F46" text-anchor="middle">C</text>

  <line x1="570" y1="138" x2="620" y2="138" stroke="#059669" stroke-width="1"/>
  <line x1="550" y1="148" x2="580" y2="165" stroke="#059669" stroke-width="1"/>
  <line x1="640" y1="148" x2="610" y2="165" stroke="#059669" stroke-width="1"/>

  <text x="595" y="195" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">同事合作 / 横向协调</text>
  <text x="595" y="215" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">灵活但最难管控</text>

  <!-- Pattern 4: Pipeline -->
  <rect x="720" y="60" width="210" height="170" rx="8" fill="#FFF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="825" y="85" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#5B21B6" text-anchor="middle">Pipeline</text>

  <rect x="740" y="100" width="50" height="24" rx="4" fill="#EDE9FE"/>
  <text x="765" y="116" font-family="Segoe UI, sans-serif" font-size="10" fill="#5B21B6" text-anchor="middle">A</text>
  <line x1="790" y1="112" x2="800" y2="112" stroke="#64748B" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="802" y="100" width="50" height="24" rx="4" fill="#EDE9FE"/>
  <text x="827" y="116" font-family="Segoe UI, sans-serif" font-size="10" fill="#5B21B6" text-anchor="middle">B</text>
  <line x1="852" y1="112" x2="862" y2="112" stroke="#64748B" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="864" y="100" width="50" height="24" rx="4" fill="#EDE9FE"/>
  <text x="889" y="116" font-family="Segoe UI, sans-serif" font-size="10" fill="#5B21B6" text-anchor="middle">C</text>

  <text x="825" y="160" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">工厂流水线 / 分阶段</text>
  <text x="825" y="180" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">阶段间可并行</text>

  <!-- Bottom comparison table -->
  <rect x="30" y="260" width="900" height="180" rx="8" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="480" y="288" font-family="PingFang SC, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#1E293B" text-anchor="middle">快速对比</text>

  <rect x="50" y="300" width="120" height="24" fill="#F1F5F9"/>
  <text x="55" y="316" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#475569">维度</text>
  <rect x="170" y="300" width="175" height="24" fill="#EFF6FF"/>
  <text x="180" y="316" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#1E40AF">Orchestrator/Worker</text>
  <rect x="345" y="300" width="175" height="24" fill="#FFFBEB"/>
  <text x="355" y="316" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#92400E">Supervisor</text>
  <rect x="520" y="300" width="175" height="24" fill="#ECFDF5"/>
  <text x="530" y="316" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#065F46">Peer-to-Peer</text>
  <rect x="695" y="300" width="215" height="24" fill="#F5F3FF"/>
  <text x="705" y="316" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#5B21B6">Pipeline</text>

  <text x="55" y="345" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">控制</text>
  <text x="180" y="345" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">中心化</text>
  <text x="355" y="345" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">中心化审查</text>
  <text x="530" y="345" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">去中心化</text>
  <text x="705" y="345" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">顺序传递</text>

  <text x="55" y="370" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">复杂度</text>
  <text x="180" y="370" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">低</text>
  <text x="355" y="370" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">中</text>
  <text x="530" y="370" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">高</text>
  <text x="705" y="370" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">中</text>

  <text x="55" y="395" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">可调试性</text>
  <text x="180" y="395" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#059669">高</text>
  <text x="355" y="395" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#059669">高</text>
  <text x="530" y="395" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#EF4444">低</text>
  <text x="705" y="395" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#D97706">中</text>

  <text x="55" y="420" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">推荐</text>
  <text x="180" y="420" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" fill="#2563EB" font-weight="bold">首选</text>
  <text x="355" y="420" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">需要时加</text>
  <text x="530" y="420" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">高级场景</text>
  <text x="705" y="420" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569">阶段明确时</text>
</svg>