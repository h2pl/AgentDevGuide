<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="Segoe UI, PingFang SC, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/></filter>
    <filter id="card"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.06"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#94A3B8"/></marker>
  </defs>

  <rect width="960" height="440" fill="#F8FAFC" rx="12" filter="url(#shadow)"/>
  <text x="480" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1E293B">多模态 RAG 架构</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748B">从查询到回答的完整数据流</text>

  <!-- 输入层 -->
  <rect x="30" y="80" width="200" height="50" rx="8" fill="white" filter="url(#card)"/>
  <text x="130" y="102" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">用户查询</text>
  <text x="130" y="118" text-anchor="middle" font-size="10" fill="#64748B">文字 / 图片 / 混合</text>

  <line x1="230" y1="105" x2="290" y2="105" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 路由层 -->
  <rect x="295" y="72" width="180" height="65" rx="8" fill="white" filter="url(#card)"/>
  <rect x="295" y="72" width="180" height="3" rx="1.5" fill="#D97706"/>
  <text x="385" y="95" text-anchor="middle" font-size="12" font-weight="600" fill="#D97706">路由层</text>
  <text x="385" y="112" text-anchor="middle" font-size="10" fill="#64748B">判断查询类型</text>
  <text x="385" y="127" text-anchor="middle" font-size="10" fill="#64748B">文字/图片/PDF/视频</text>

  <!-- 三条路 -->
  <line x1="475" y1="95" x2="530" y2="55" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="475" y1="105" x2="530" y2="105" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="475" y1="120" x2="530" y2="160" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 文字检索 -->
  <rect x="535" y="30" width="195" height="55" rx="7" fill="white" filter="url(#card)"/>
  <rect x="535" y="30" width="4" height="55" rx="2" fill="#2563EB"/>
  <text x="632" y="53" text-anchor="middle" font-size="11" font-weight="600" fill="#2563EB">文字 Embedding 检索</text>
  <text x="632" y="70" text-anchor="middle" font-size="9" fill="#64748B">OpenAI Embedding · BGE · Milvus</text>

  <!-- 图片检索 -->
  <rect x="535" y="78" width="195" height="55" rx="7" fill="white" filter="url(#card)"/>
  <rect x="535" y="78" width="4" height="55" rx="2" fill="#059669"/>
  <text x="632" y="101" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">视觉 Embedding 检索</text>
  <text x="632" y="118" text-anchor="middle" font-size="9" fill="#64748B">CLIP · SigLIP · ColPali</text>

  <!-- PDF检索 -->
  <rect x="535" y="138" width="195" height="55" rx="7" fill="white" filter="url(#card)"/>
  <rect x="535" y="138" width="4" height="55" rx="2" fill="#8B5CF6"/>
  <text x="632" y="161" text-anchor="middle" font-size="11" font-weight="600" fill="#8B5CF6">PDF 页面检索</text>
  <text x="632" y="178" text-anchor="middle" font-size="9" fill="#64748B">ColPali · 视觉页面嵌入</text>

  <!-- 汇聚 -->
  <line x1="730" y1="58" x2="780" y2="210" stroke="#94A3B8" stroke-width="1"/>
  <line x1="730" y1="105" x2="780" y2="210" stroke="#94A3B8" stroke-width="1"/>
  <line x1="730" y1="165" x2="780" y2="210" stroke="#94A3B8" stroke-width="1"/>

  <!-- 融合层 -->
  <rect x="745" y="200" width="185" height="65" rx="8" fill="white" filter="url(#card)"/>
  <rect x="745" y="200" width="185" height="3" rx="1.5" fill="#2563EB"/>
  <text x="837" y="225" text-anchor="middle" font-size="12" font-weight="600" fill="#2563EB">RRF 融合 + 重排序</text>
  <text x="837" y="242" text-anchor="middle" font-size="9" fill="#64748B">多路结果融合</text>
  <text x="837" y="257" text-anchor="middle" font-size="9" fill="#64748B">VLM 相关性重排序</text>

  <!-- 底部：向量库 -->
  <rect x="60" y="290" width="880" height="125" rx="8" fill="white" filter="url(#card)"/>
  <text x="500" y="318" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">统一向量存储层</text>

  <rect x="90" y="335" width="150" height="55" rx="6" fill="#2563EB" opacity="0.06"/>
  <text x="165" y="358" text-anchor="middle" font-size="11" font-weight="600" fill="#2563EB">文字向量</text>
  <text x="165" y="376" text-anchor="middle" font-size="9" fill="#64748B">BERT/OpenAI Emb</text>

  <rect x="270" y="335" width="150" height="55" rx="6" fill="#059669" opacity="0.06"/>
  <text x="345" y="358" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">图片向量</text>
  <text x="345" y="376" text-anchor="middle" font-size="9" fill="#64748B">CLIP · SigLIP</text>

  <rect x="450" y="335" width="150" height="55" rx="6" fill="#8B5CF6" opacity="0.06"/>
  <text x="525" y="358" text-anchor="middle" font-size="11" font-weight="600" fill="#8B5CF6">页面向量</text>
  <text x="525" y="376" text-anchor="middle" font-size="9" fill="#64748B">ColPali 视觉嵌入</text>

  <rect x="630" y="335" width="150" height="55" rx="6" fill="#D97706" opacity="0.06"/>
  <text x="705" y="358" text-anchor="middle" font-size="11" font-weight="600" fill="#D97706">描述向量</text>
  <text x="705" y="376" text-anchor="middle" font-size="9" fill="#64748B">VLM生成描述嵌入</text>

  <rect x="810" y="335" width="100" height="55" rx="6" fill="#EF4444" opacity="0.06"/>
  <text x="860" y="358" text-anchor="middle" font-size="11" font-weight="600" fill="#EF4444">元数据</text>
  <text x="860" y="376" text-anchor="middle" font-size="9" fill="#64748B">结构化信息</text>
</svg>