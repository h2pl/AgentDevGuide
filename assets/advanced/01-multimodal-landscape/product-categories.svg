  <text x="417" y="468" text-anchor="middle" font-size="14" font-weight="700" fill="#EF4444">3 款</text>

  <rect x="505" y="430" width="135" height="45" rx="6" fill="white" filter="url(#card)"/>
  <text x="572" y="450" text-anchor="middle" font-size="10" fill="#64748B">开发者 API</text>
  <text x="572" y="468" text-anchor="middle" font-size="14" font-weight="700" fill="#0EA5E9">5 款</text>

  <rect x="660" y="430" width="280" height="45" rx="6" fill="white" filter="url(#card)"/>
  <text x="800" y="450" text-anchor="middle" font-size="10" fill="#64748B">总覆盖</text>
  <text x="800" y="468" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">40+ 款产品</text>
