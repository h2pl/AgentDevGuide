  <text x="170" y="321" font-size="14" fill="#94A3B8">→</text>

  <rect x="195" y="298" width="140" height="36" rx="5" fill="#F1F5F9"/>
  <text x="265" y="321" text-anchor="middle" font-size="11" fill="#475569">Seedream 生封面图</text>
  <text x="345" y="321" font-size="14" fill="#94A3B8">→</text>

  <rect x="370" y="298" width="140" height="36" rx="5" fill="#F1F5F9"/>
  <text x="440" y="321" text-anchor="middle" font-size="11" fill="#475569">即梦/Seedance 生视频</text>
  <text x="520" y="321" font-size="14" fill="#94A3B8">→</text>

  <rect x="545" y="298" width="120" height="36" rx="5" fill="#F1F5F9"/>
  <text x="605" y="321" text-anchor="middle" font-size="11" fill="#475569">剪辑+配音</text>
  <text x="675" y="321" font-size="14" fill="#94A3B8">→</text>

  <rect x="700" y="298" width="100" height="36" rx="5" fill="#F1F5F9"/>
  <text x="750" y="321" text-anchor="middle" font-size="11" fill="#475569">抖音发布</text>

  <text x="480" y="365" text-anchor="middle" font-size="10" fill="#059669">全链路中文操作 · 零切换成本 · 免费可用</text>
  <text x="480" y="380" text-anchor="middle" font-size="9" fill="#64748B">外加: 可灵(快手) · PaddleSpeech(百度) · Fish Audio/GPT-SoVITS(开源语音)</text>
</svg>