  <!-- 梯队1 -->
  <rect x="20" y="80" width="220" height="150" rx="8" fill="white" filter="url(#card)"/>
  <rect x="20" y="80" width="220" height="4" rx="2" fill="#2563EB"/>
  <text x="130" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#2563EB">字节系</text>
  <text x="130" y="126" text-anchor="middle" font-size="10" fill="#64748B">豆包 3.15亿月活</text>
  <text x="130" y="150" text-anchor="middle" font-size="11" fill="#334155">全能对话·生图·语音</text>
