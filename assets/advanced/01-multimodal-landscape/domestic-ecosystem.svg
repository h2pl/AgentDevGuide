  <text x="370" y="210" text-anchor="middle" font-size="10" fill="#64748B">B端+钉钉生态</text>

  <!-- 梯队3 -->
  <rect x="500" y="80" width="220" height="150" rx="8" fill="white" filter="url(#card)"/>
  <rect x="500" y="80" width="220" height="4" rx="2" fill="#059669"/>
  <text x="610" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">垂直强者</text>
  <text x="610" y="126" text-anchor="middle" font-size="10" fill="#64748B">各有所长</text>
