  <text x="370" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#D97706">阿里系</text>
  <text x="370" y="126" text-anchor="middle" font-size="10" fill="#64748B">通义千问·万相·听悟</text>
  <text x="370" y="150" text-anchor="middle" font-size="11" fill="#334155">最全的能力矩阵</text>
  <text x="370" y="170" text-anchor="middle" font-size="11" fill="#334155">通义万相 电商生图</text>
