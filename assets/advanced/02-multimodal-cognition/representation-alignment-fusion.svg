<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Segoe UI, PingFang SC, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/></filter>
    <filter id="card"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.06"/></filter>
  </defs>
  <rect width="960" height="420" fill="#F8FAFC" rx="12" filter="url(#shadow)"/>
  <text x="480" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1E293B">表示 · 对齐 · 融合 — 三大核心机制</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748B">多模态模型内部的信息处理流程</text>

  <!-- 表示 -->
  <rect x="20" y="80" width="295" height="120" rx="8" fill="white" filter="url(#card)"/>
  <rect x="20" y="80" width="295" height="4" rx="2" fill="#2563EB"/>
  <text x="167" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#2563EB">① 表示（Representation）</text>
  <text x="167" y="128" text-anchor="middle" font-size="10" fill="#64748B">把世界变成向量</text>
  <text x="167" y="150" text-anchor="middle" font-size="11" fill="#334155">文本→Token→Embedding</text>
  <text x="167" y="168" text-anchor="middle" font-size="11" fill="#334155">图片→ViT Patch→向量</text>
  <text x="167" y="186" text-anchor="middle" font-size="11" fill="#334155">音频→频谱→Patch→Token</text>

  <text x="330" y="145" font-size="18" fill="#94A3B8">→</text>

  <!-- 对齐 -->
  <rect x="345" y="80" width="270" height="120" rx="8" fill="white" filter="url(#card)"/>
  <rect x="345" y="80" width="270" height="4" rx="2" fill="#D97706"/>
  <text x="480" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#D97706">② 对齐（Alignment）</text>
  <text x="480" y="128" text-anchor="middle" font-size="10" fill="#64748B">让图和文互相理解</text>
  <text x="480" y="150" text-anchor="middle" font-size="11" fill="#334155">CLIP 对比学习 · 全局对齐</text>
  <text x="480" y="168" text-anchor="middle" font-size="11" fill="#334155">Q-Former · 精细化提取</text>
  <text x="480" y="186" text-anchor="middle" font-size="11" fill="#334155">GPT-4o · 端到端隐式对齐</text>

  <text x="630" y="145" font-size="18" fill="#94A3B8">→</text>

  <!-- 融合 -->
  <rect x="645" y="80" width="295" height="120" rx="8" fill="white" filter="url(#card)"/>
  <rect x="645" y="80" width="295" height="4" rx="2" fill="#059669"/>
  <text x="792" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">③ 融合（Fusion）</text>
  <text x="792" y="128" text-anchor="middle" font-size="10" fill="#64748B">综合所有信息推理</text>
  <text x="792" y="150" text-anchor="middle" font-size="11" fill="#334155">自注意力机制驱动</text>
  <text x="792" y="168" text-anchor="middle" font-size="11" fill="#334155">L1局部→L6跨模态→L18全局</text>
  <text x="792" y="186" text-anchor="middle" font-size="11" fill="#334155">残差连接防信息丢失</text>

  <!-- 底部: 对齐方案对比 -->
  <rect x="20" y="220" width="920" height="185" rx="8" fill="white" filter="url(#card)"/>
  <text x="480" y="248" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">四种对齐方案的演进</text>

  <rect x="40" y="268" width="200" height="60" rx="6" fill="#F1F5F9"/>
  <text x="140" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#2563EB">① CLIP 全局对比</text>
  <text x="140" y="308" text-anchor="middle" font-size="9" fill="#64748B">4亿对数据 · 地基</text>
  <text x="140" y="322" text-anchor="middle" font-size="9" fill="#94A3B8">2021</text>

  <rect x="260" y="268" width="200" height="60" rx="6" fill="#F1F5F9"/>
  <text x="360" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#D97706">② Q-Former 精细化</text>
  <text x="360" y="308" text-anchor="middle" font-size="9" fill="#64748B">32查询向量 · 按需提取</text>
  <text x="360" y="322" text-anchor="middle" font-size="9" fill="#94A3B8">2023.01</text>

  <rect x="480" y="268" width="200" height="60" rx="6" fill="#F1F5F9"/>
  <text x="580" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">③ LLaVA 极简投影</text>
  <text x="580" y="308" text-anchor="middle" font-size="9" fill="#64748B">单层MLP · 格式转换</text>
  <text x="580" y="322" text-anchor="middle" font-size="9" fill="#94A3B8">2023.04</text>

  <rect x="700" y="268" width="220" height="60" rx="6" fill="#DBEAFE"/>
  <text x="810" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#2563EB">④ GPT-4o 端到端隐式</text>
  <text x="810" y="308" text-anchor="middle" font-size="9" fill="#64748B">统一Token·自注意力涌现</text>
  <text x="810" y="322" text-anchor="middle" font-size="9" fill="#94A3B8">2025</text>

  <text x="480" y="365" text-anchor="middle" font-size="10" fill="#64748B">趋势：从"显式对齐模块"到"隐式端到端对齐"，信息损失逐代降低</text>
  <text x="480" y="385" text-anchor="middle" font-size="10" fill="#2563EB">CLIP(需专门训练)→Q-Former(翻译层)→LLaVA(格式转换)→GPT-4o(不需要翻译)</text>
</svg>