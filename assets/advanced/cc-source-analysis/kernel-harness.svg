<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="kernel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F87171"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="harness" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="520" fill="url(#bg)" rx="12"/>

  <!-- 标题 -->
  <text x="480" y="48" text-anchor="middle" font-size="24" font-weight="bold" fill="#1E293B">Kernel + Harness 架构</text>
  <text x="480" y="74" text-anchor="middle" font-size="14" fill="#64748B">把不确定性锁在极薄的内核里，其余用确定性工程兜底</text>

  <!-- Harness 外框 -->
  <rect x="80" y="110" width="800" height="320" rx="12" fill="url(#harness)" opacity="0.15" stroke="#2563EB" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="120" y="150" font-size="16" font-weight="bold" fill="#2563EB">Harness（确定性外壳）</text>
  <text x="820" y="150" text-anchor="end" font-size="13" fill="#2563EB">~40 万行工程代码</text>

  <!-- Harness 模块 -->
  <g transform="translate(120, 180)" filter="url(#shadow)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#fff" stroke="#2563EB" stroke-width="1.5"/>
    <text x="65" y="35" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">权限管理</text>
    <text x="65" y="58" text-anchor="middle" font-size="11" fill="#64748B">7 模式 / 8 优先级</text>
  </g>

  <g transform="translate(280, 180)" filter="url(#shadow)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#fff" stroke="#2563EB" stroke-width="1.5"/>
    <text x="65" y="35" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">上下文压缩</text>
    <text x="65" y="58" text-anchor="middle" font-size="11" fill="#64748B">5 层渐进压缩</text>
  </g>

  <g transform="translate(440, 180)" filter="url(#shadow)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#fff" stroke="#2563EB" stroke-width="1.5"/>
    <text x="65" y="35" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">记忆系统</text>
    <text x="65" y="58" text-anchor="middle" font-size="11" fill="#64748B">memdir / autoDream</text>
  </g>

  <g transform="translate(600, 180)" filter="url(#shadow)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#fff" stroke="#2563EB" stroke-width="1.5"/>
    <text x="65" y="35" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">工具调度</text>
    <text x="65" y="58" text-anchor="middle" font-size="11" fill="#64748B">42 工具 / 并发</text>
  </g>

  <g transform="translate(760, 180)" filter="url(#shadow)">
    <rect x="0" y="0" width="100" height="80" rx="8" fill="#fff" stroke="#2563EB" stroke-width="1.5"/>
    <text x="50" y="35" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">可观测性</text>
    <text x="50" y="58" text-anchor="middle" font-size="11" fill="#64748B">三层 Sink</text>
  </g>

  <g transform="translate(120, 290)" filter="url(#shadow)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#fff" stroke="#2563EB" stroke-width="1.5"/>
    <text x="65" y="35" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">启动优化</text>
    <text x="65" y="58" text-anchor="middle" font-size="11" fill="#64748B">Fast-path / 预取</text>
  </g>

  <g transform="translate(280, 290)" filter="url(#shadow)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#fff" stroke="#2563EB" stroke-width="1.5"/>
    <text x="65" y="35" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">终端渲染</text>
    <text x="65" y="58" text-anchor="middle" font-size="11" fill="#64748B">React + Ink</text>
  </g>

  <g transform="translate(440, 290)" filter="url(#shadow)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#fff" stroke="#2563EB" stroke-width="1.5"/>
    <text x="65" y="35" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">会话持久化</text>
    <text x="65" y="58" text-anchor="middle" font-size="11" fill="#64748B">state / tasks</text>
  </g>

  <g transform="translate(600, 290)" filter="url(#shadow)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#fff" stroke="#2563EB" stroke-width="1.5"/>
    <text x="65" y="35" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">扩展机制</text>
    <text x="65" y="58" text-anchor="middle" font-size="11" fill="#64748B">Hook / Skill / MCP</text>
  </g>

  <g transform="translate(760, 290)" filter="url(#shadow)">
    <rect x="0" y="0" width="100" height="80" rx="8" fill="#fff" stroke="#2563EB" stroke-width="1.5"/>
    <text x="50" y="35" text-anchor="middle" font-size="13" font-weight="600" fill="#1E293B">IDE 集成</text>
    <text x="50" y="58" text-anchor="middle" font-size="11" fill="#64748B">Bridge 层</text>
  </g>

  <!-- Kernel -->
  <g transform="translate(360, 390)" filter="url(#shadow)">
    <rect x="0" y="0" width="240" height="70" rx="10" fill="url(#kernel)" stroke="#DC2626" stroke-width="2"/>
    <text x="120" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">Kernel（AI 内核）</text>
    <text x="120" y="52" text-anchor="middle" font-size="12" fill="#FEE2E2">88 行 while 循环</text>
  </g>

  <!-- 双向箭头 -->
  <line x1="480" y1="390" x2="480" y2="370" stroke="#DC2626" stroke-width="2"/>
  <polygon points="475,375 480,365 485,375" fill="#DC2626"/>
  <line x1="480" y1="370" x2="480" y2="390" stroke="#DC2626" stroke-width="2"/>
  <polygon points="475,385 480,395 485,385" fill="#DC2626"/>

  <!-- 底部说明 -->
  <text x="480" y="490" text-anchor="middle" font-size="12" fill="#64748B">Harness 用传统软件工程方法保证可预测性，Kernel 只负责调用模型做决策</text>
</svg>