<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="phase1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#60A5FA"/><stop offset="100%" stop-color="#2563EB"/></linearGradient>
    <linearGradient id="phase2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#34D399"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    <linearGradient id="phase3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#FBBF24"/><stop offset="100%" stop-color="#D97706"/></linearGradient>
    <linearGradient id="phase4" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#A78BFA"/><stop offset="100%" stop-color="#7C3AED"/></linearGradient>
    <filter id="shadow" x="-2%" y="-5%" width="104%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="960" height="420" fill="url(#bg)" rx="12"/>

  <text x="480" y="44" text-anchor="middle" font-size="24" font-weight="bold" fill="#1E293B">Claude Code 启动时间线</text>
  <text x="480" y="70" text-anchor="middle" font-size="14" fill="#64748B">并行预取把启动时间从 ~250ms 压缩到 ~135ms</text>

  <!-- 时间轴 -->
  <line x1="80" y1="120" x2="880" y2="120" stroke="#CBD5E1" stroke-width="3"/>
  <text x="80" y="145" font-size="12" fill="#64748B">0ms</text>
  <text x="300" y="145" font-size="12" fill="#64748B">~50ms</text>
  <text x="500" y="145" font-size="12" fill="#64748B">~100ms</text>
  <text x="700" y="145" font-size="12" fill="#64748B">~135ms</text>
  <text x="850" y="145" font-size="12" fill="#64748B">~250ms</text>

  <!-- 串行版本 -->
  <g transform="translate(80, 180)">
    <text x="0" y="-12" font-size="13" font-weight="600" fill="#475569">未优化（串行）</text>
    <rect x="0" y="0" width="270" height="32" rx="6" fill="url(#phase1)" filter="url(#shadow)"/>
    <text x="10" y="21" font-size="11" fill="#fff" font-weight="600">import 模块 ~135ms</text>
    <rect x="270" y="0" width="100" height="32" rx="6" fill="url(#phase2)" filter="url(#shadow)"/>
    <text x="280" y="21" font-size="11" fill="#fff" font-weight="600">MDM ~50ms</text>
    <rect x="370" y="0" width="130" height="32" rx="6" fill="url(#phase3)" filter="url(#shadow)"/>
    <text x="380" y="21" font-size="11" fill="#fff" font-weight="600">Keychain ~65ms</text>
  </g>

  <!-- 并行版本 -->
  <g transform="translate(80, 260)">
    <text x="0" y="-12" font-size="13" font-weight="600" fill="#475569">优化后（并行）</text>
    <rect x="0" y="0" width="270" height="32" rx="6" fill="url(#phase1)" filter="url(#shadow)"/>
    <text x="10" y="21" font-size="11" fill="#fff" font-weight="600">import 模块 ~135ms</text>
    <rect x="0" y="42" width="100" height="24" rx="6" fill="url(#phase2)" opacity="0.85"/>
    <text x="8" y="58" font-size="10" fill="#fff">MDM ~50ms</text>
    <rect x="0" y="72" width="130" height="24" rx="6" fill="url(#phase3)" opacity="0.85"/>
    <text x="8" y="88" font-size="10" fill="#fff">Keychain ~65ms</text>
  </g>

  <!-- 效果标注 -->
  <g transform="translate(650, 340)">
    <rect x="0" y="0" width="230" height="70" fill="#fff" stroke="#059669" stroke-width="2" rx="8" filter="url(#shadow)"/>
    <text x="115" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#059669">启动时间降低 46%</text>
    <text x="115" y="52" text-anchor="middle" font-size="12" fill="#475569">~250ms → ~135ms</text>
  </g>

  <text x="480" y="400" text-anchor="middle" font-size="12" fill="#94A3B8">MDM 和 Keychain 被"藏"在 import 的时间段内完成</text>
</svg>