<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Segoe UI, PingFang SC, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="960" height="420" fill="#F8FAFC" rx="12" filter="url(#shadow)"/>

  <text x="480" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1E293B">VLM 演进：从 CLIP 到 GPT-4o</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748B">2021-2026：五年，四次关键跳跃</text>

  <!-- 时间轴线 -->
  <line x1="60" y1="200" x2="900" y2="200" stroke="#CBD5E1" stroke-width="3"/>
  <line x1="60" y1="195" x2="60" y2="205" stroke="#94A3B8" stroke-width="2"/>
  <line x1="260" y1="195" x2="260" y2="205" stroke="#94A3B8" stroke-width="2"/>
  <line x1="430" y1="195" x2="430" y2="205" stroke="#94A3B8" stroke-width="2"/>
  <line x1="620" y1="195" x2="620" y2="205" stroke="#94A3B8" stroke-width="2"/>
  <line x1="900" y1="195" x2="900" y2="205" stroke="#94A3B8" stroke-width="2"/>

  <text x="60" y="225" text-anchor="middle" font-size="11" fill="#64748B">2021</text>
  <text x="260" y="225" text-anchor="middle" font-size="11" fill="#64748B">2023.01</text>
  <text x="430" y="225" text-anchor="middle" font-size="11" fill="#64748B">2023.04</text>
  <text x="620" y="225" text-anchor="middle" font-size="11" fill="#64748B">2023.10-24</text>
  <text x="900" y="225" text-anchor="middle" font-size="11" fill="#64748B">2025-26</text>

  <!-- CLIP -->
  <rect x="20" y="85" width="120" height="100" rx="8" fill="white" stroke="#2563EB" stroke-width="1.5"/>
  <text x="80" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#2563EB">CLIP</text>
  <text x="80" y="130" text-anchor="middle" font-size="9" fill="#64748B">图文匹配</text>
  <text x="80" y="148" text-anchor="middle" font-size="9" fill="#64748B">4亿对数据</text>
  <text x="80" y="166" text-anchor="middle" font-size="9" fill="#2563EB">零样本分类</text>

  <text x="155" y="135" font-size="14" fill="#94A3B8">→</text>

  <!-- BLIP-2 -->
  <rect x="180" y="85" width="130" height="100" rx="8" fill="white" stroke="#D97706" stroke-width="1.5"/>
  <text x="245" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#D97706">BLIP-2</text>
  <text x="245" y="130" text-anchor="middle" font-size="9" fill="#64748B">Q-Former桥接</text>
  <text x="245" y="148" text-anchor="middle" font-size="9" fill="#64748B">32查询向量</text>
  <text x="245" y="166" text-anchor="middle" font-size="9" fill="#D97706">精细化提取</text>

  <text x="325" y="135" font-size="14" fill="#94A3B8">→</text>

  <!-- LLaVA -->
  <rect x="350" y="85" width="140" height="100" rx="8" fill="white" stroke="#059669" stroke-width="1.5"/>
  <text x="420" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">LLaVA</text>
  <text x="420" y="130" text-anchor="middle" font-size="9" fill="#64748B">GPT-4生数据</text>
  <text x="420" y="148" text-anchor="middle" font-size="9" fill="#64748B">极简投影层</text>
  <text x="420" y="166" text-anchor="middle" font-size="9" fill="#059669">开源对话破圈</text>

  <text x="505" y="135" font-size="14" fill="#94A3B8">→</text>

  <!-- Qwen-VL -->
  <rect x="530" y="85" width="140" height="100" rx="8" fill="white" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="600" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#8B5CF6">Qwen-VL</text>
  <text x="600" y="130" text-anchor="middle" font-size="9" fill="#64748B">中文训练</text>
  <text x="600" y="148" text-anchor="middle" font-size="9" fill="#64748B">视觉定位</text>
  <text x="600" y="166" text-anchor="middle" font-size="9" fill="#8B5CF6">多图理解</text>

  <text x="685" y="135" font-size="14" fill="#94A3B8">→</text>

  <!-- GPT-4o / Gemini -->
  <rect x="710" y="85" width="230" height="100" rx="8" fill="white" stroke="#EC4899" stroke-width="1.5"/>
  <text x="825" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#EC4899">GPT-4o / Gemini / Claude</text>
  <text x="825" y="130" text-anchor="middle" font-size="9" fill="#64748B">原生统一 · 端到端</text>
  <text x="825" y="148" text-anchor="middle" font-size="9" fill="#64748B">理解+生成闭环</text>
  <text x="825" y="166" text-anchor="middle" font-size="9" fill="#EC4899">实时语音232ms</text>

  <!-- 底部: 能力对比 -->
  <rect x="40" y="260" width="880" height="140" rx="8" fill="white"/>
  <text x="480" y="288" text-anchor="middle" font-size="14" font-weight="700" fill="#1E293B">各阶段解锁的核心能力</text>

  <rect x="60" y="305" width="150" height="75" rx="6" fill="#2563EB" opacity="0.08"/>
  <text x="135" y="328" text-anchor="middle" font-size="11" font-weight="600" fill="#2563EB">图文匹配</text>
  <text x="135" y="348" text-anchor="middle" font-size="10" fill="#64748B">零样本分类</text>
  <text x="135" y="366" text-anchor="middle" font-size="10" fill="#64748B">跨模态检索</text>

  <rect x="230" y="305" width="150" height="75" rx="6" fill="#D97706" opacity="0.08"/>
  <text x="305" y="328" text-anchor="middle" font-size="11" font-weight="600" fill="#D97706">看图聊天</text>
  <text x="305" y="348" text-anchor="middle" font-size="10" fill="#64748B">物体描述</text>
  <text x="305" y="366" text-anchor="middle" font-size="10" fill="#64748B">简单场景理解</text>

  <rect x="400" y="305" width="150" height="75" rx="6" fill="#059669" opacity="0.08"/>
  <text x="475" y="328" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">深度视觉理解</text>
  <text x="475" y="348" text-anchor="middle" font-size="10" fill="#64748B">文档·图表·OCR</text>
  <text x="475" y="366" text-anchor="middle" font-size="10" fill="#64748B">多轮指令跟随</text>

  <rect x="570" y="305" width="150" height="75" rx="6" fill="#8B5CF6" opacity="0.08"/>
  <text x="645" y="328" text-anchor="middle" font-size="11" font-weight="600" fill="#8B5CF6">精细化定位</text>
  <text x="645" y="348" text-anchor="middle" font-size="10" fill="#64748B">视觉Grounding</text>
  <text x="645" y="366" text-anchor="middle" font-size="10" fill="#64748B">多图对比分析</text>

  <rect x="740" y="305" width="160" height="75" rx="6" fill="#EC4899" opacity="0.08"/>
  <text x="820" y="328" text-anchor="middle" font-size="11" font-weight="600" fill="#EC4899">原生统一多模态</text>
  <text x="820" y="348" text-anchor="middle" font-size="10" fill="#64748B">理解+生成闭环</text>
  <text x="820" y="366" text-anchor="middle" font-size="10" fill="#64748B">实时语音对话</text>
</svg>