<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" font-family="Segoe UI, PingFang SC, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="960" height="220" fill="#F8FAFC" rx="12" filter="url(#shadow)"/>
  <text x="480" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1E293B">LLaVA 到 Qwen-VL 的制作差异</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748B">架构·训练数据·能力定位的三维对比</text>

  <rect x="20" y="80" width="295" height="60" rx="8" fill="white"/>
  <text x="167" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#2563EB">LLaVA</text>
  <text x="167" y="122" text-anchor="middle" font-size="9" fill="#64748B">CLIP ViT + 投影层 + LLaMA · 英文为主 · 576 Token</text>

  <rect x="335" y="80" width="295" height="60" rx="8" fill="white"/>
