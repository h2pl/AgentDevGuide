  <text x="482" y="122" text-anchor="middle" font-size="9" fill="#64748B">自研视觉编码 + Qwen LLM · 中文原生 · Visual Grounding</text>

  <rect x="650" y="80" width="290" height="60" rx="8" fill="white"/>
  <text x="795" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#D97706">InternVL</text>
  <text x="795" y="122" text-anchor="middle" font-size="9" fill="#64748B">自研InternViT-6B + InternLM · 3D视觉·GUI理解</text>

  <rect x="20" y="155" width="920" height="50" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="480" y="178" text-anchor="middle" font-size="11" fill="#334155">使用差异: LLaVA用CLIP→受限于CLIP质量 | Qwen-VL中文自训→中文OCR最强 | InternVL全自研→无短板</text>
  <text x="480" y="196" text-anchor="middle" font-size="10" fill="#2563EB">选择: 英文通用→LLaVA | 中文OCR→Qwen-VL | 均衡→InternVL</text>
