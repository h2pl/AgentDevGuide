<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" width="960" height="420">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
  </defs>
  <rect width="960" height="420" fill="#F8FAFC" rx="8" filter="url(#shadow)"/>
  <text x="480" y="35" font-family="PingFang SC, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1E293B" text-anchor="middle">Agent 成本模型与管控体系</text>

  <!-- Cost breakdown -->
  <rect x="40" y="60" width="430" height="330" rx="10" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="40" y="60" width="430" height="36" rx="10" fill="#475569"/>
  <text x="255" y="84" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#FFF" text-anchor="middle">成本构成</text>

  <!-- LLM 推理 78% -->
  <rect x="60" y="112" width="390" height="44" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <rect x="60" y="112" width="304" height="44" rx="8" fill="#2563EB"/>
  <text x="255" y="135" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">LLM 推理 78%</text>
  <text x="255" y="150" font-family="Segoe UI, sans-serif" font-size="9" fill="#BFDBFE" text-anchor="middle">模型选择 · token 压缩 · 减少调用次数</text>

  <text x="380" y="140" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" fill="#1E40AF" text-anchor="middle">¥93,600/月</text>

  <!-- 向量检索 10% -->
  <rect x="60" y="164" width="390" height="36" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <rect x="60" y="164" width="39" height="36" rx="8" fill="#059669"/>
  <text x="255" y="188" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#166534" text-anchor="middle">向量检索 10%</text>
  <text x="380" y="188" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" fill="#166534" text-anchor="middle">¥12,000/月</text>

  <!-- 外部工具 API 8% -->
  <rect x="60" y="208" width="390" height="36" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <rect x="60" y="208" width="31" height="36" rx="8" fill="#D97706"/>
  <text x="255" y="232" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#92400E" text-anchor="middle">外部工具 API 8%</text>
  <text x="380" y="232" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" fill="#92400E" text-anchor="middle">¥9,600/月</text>

  <!-- 基础设施 4% -->
  <rect x="60" y="252" width="390" height="36" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <rect x="60" y="252" width="16" height="36" rx="8" fill="#64748B"/>
  <text x="255" y="276" font-family="PingFang SC, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#475569" text-anchor="middle">基础设施 4%</text>
  <text x="380" y="276" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" fill="#475569" text-anchor="middle">¥4,800/月</text>

  <!-- Total -->
  <text x="255" y="318" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1E293B" text-anchor="middle">月总成本: ¥120,000</text>
  <text x="255" y="340" font-family="Segoe UI, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">日活 10 万 · 日均 30 万请求 · 每请求 ¥0.32</text>

  <!-- Right: Budget management -->
  <rect x="490" y="60" width="430" height="330" rx="10" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="490" y="60" width="430" height="36" rx="10" fill="#475569"/>
  <text x="705" y="84" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#FFF" text-anchor="middle">三层预算 + 保护机制</text>

  <!-- Budget allocation -->
  <rect x="510" y="108" width="195" height="44" rx="6" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1"/>
  <text x="607" y="128" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#1E40AF" text-anchor="middle">模型 A (gpt-4o)</text>
  <text x="607" y="144" font-family="Segoe UI, sans-serif" font-size="10" fill="#475569" text-anchor="middle">¥55,000 · 硬上限</text>

  <rect x="715" y="108" width="185" height="44" rx="6" fill="#D1FAE5" stroke="#86EFAC" stroke-width="1"/>
  <text x="807" y="128" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#166534" text-anchor="middle">模型 B (gpt-4o-mini)</text>
  <text x="807" y="144" font-family="Segoe UI, sans-serif" font-size="10" fill="#475569" text-anchor="middle">¥15,000</text>

  <rect x="510" y="160" width="195" height="36" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="607" y="183" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#92400E" text-anchor="middle">向量检索 ¥8,000</text>

  <rect x="715" y="160" width="185" height="36" rx="6" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="807" y="183" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#991B1B" text-anchor="middle">外部工具 ¥5,000</text>

  <rect x="510" y="204" width="390" height="30" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="705" y="224" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" fill="#475569" text-anchor="middle">预留弹性 ¥17,000 · 应对突发流量</text>

  <!-- Protection mechanisms -->
  <text x="705" y="264" font-family="PingFang SC, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#475569" text-anchor="middle">保护机制</text>

  <rect x="510" y="278" width="185" height="36" rx="18" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="602" y="300" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#92400E" text-anchor="middle">软限制 (80%)</text>

  <rect x="705" y="278" width="195" height="36" rx="18" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1"/>
  <text x="802" y="300" font-family="PingFang SC, Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#991B1B" text-anchor="middle">硬限制 (100%)</text>

  <text x="705" y="340" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">软限制告警 + 自动降级 · 硬限制停止非核心服务</text>
  <text x="705" y="358" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">每请求上限: 10 次 LLM · 50,000 token</text>
</svg>