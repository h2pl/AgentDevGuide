<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" width="960" height="460">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="960" height="460" fill="#F8FAFC" rx="8" filter="url(#shadow)"/>
  <text x="480" y="35" font-family="PingFang SC, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1E293B" text-anchor="middle">LangGraph 代码审查工作流</text>

  <!-- Start -->
  <rect x="380" y="55" width="200" height="32" rx="16" fill="#1E293B"/>
  <text x="480" y="76" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#FFF" text-anchor="middle">PR 提交</text>

  <line x1="480" y1="87" x2="480" y2="102" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Code Review -->
  <rect x="350" y="108" width="260" height="45" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  <text x="480" y="130" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1E40AF" text-anchor="middle">1. 代码审查 Agent</text>
  <text x="480" y="147" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#475569" text-anchor="middle">审查代码质量、潜在 Bug</text>

  <!-- Branch -->
  <line x1="480" y1="153" x2="480" y2="170" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="170" x2="250" y2="170" stroke="#64748B" stroke-width="1"/>
  <line x1="480" y1="170" x2="710" y2="170" stroke="#64748B" stroke-width="1"/>

  <text x="320" y="165" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#EF4444">有安全问题</text>
  <text x="580" y="165" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#059669">无安全问题</text>

  <line x1="250" y1="170" x2="250" y2="185" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="710" y1="170" x2="710" y2="185" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Security Review -->
  <rect x="120" y="190" width="260" height="45" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="250" y="212" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#92400E">2. 安全审查 Agent</text>
  <text x="250" y="229" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#475569" text-anchor="middle">SQL 注入 · XSS · 权限审计</text>

  <line x1="250" y1="235" x2="250" y2="260" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Merge point -->
  <line x1="250" y1="260" x2="480" y2="260" stroke="#64748B" stroke-width="1"/>
  <line x1="710" y1="235" x2="710" y2="260" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="710" y1="260" x2="480" y2="260" stroke="#64748B" stroke-width="1"/>

  <line x1="480" y1="260" x2="480" y2="272" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Auto Fix -->
  <rect x="350" y="278" width="260" height="45" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="480" y="300" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#065F46">3. 自动修复 Agent（可选）</text>
  <text x="480" y="317" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#475569" text-anchor="middle">可修复问题自动修复</text>

  <line x1="480" y1="323" x2="480" y2="338" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Human Approval -->
  <rect x="350" y="343" width="260" height="45" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="480" y="365" font-family="PingFang SC, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#5B21B6">4. 人工审批</text>
  <text x="480" y="382" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#475569" text-anchor="middle">暂停等待，中断可恢复</text>

  <!-- Branch: approve/reject -->
  <line x1="480" y1="388" x2="480" y2="405" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="405" x2="350" y2="405" stroke="#64748B" stroke-width="1"/>
  <line x1="480" y1="405" x2="630" y2="405" stroke="#64748B" stroke-width="1"/>

  <text x="390" y="400" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#D97706">驳回 → 回到代码审查</text>
  <text x="540" y="400" font-family="PingFang SC, Segoe UI, sans-serif" font-size="10" fill="#059669">批准 → 结束</text>

  <line x1="350" y1="405" x2="350" y2="422" stroke="#D97706" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="630" y1="405" x2="630" y2="422" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Back to code review -->
  <text x="240" y="428" font-family="PingFang SC, Segoe UI, sans-serif" font-size="9" fill="#D97706">（最多 3 轮）</text>

  <!-- End -->
  <rect x="570" y="427" width="120" height="25" rx="12" fill="#059669"/>
  <text x="630" y="444" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#FFF" text-anchor="middle">合并 ✅</text>
</svg>