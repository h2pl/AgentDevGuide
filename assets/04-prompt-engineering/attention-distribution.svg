<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="attentionGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="15%" stop-color="#F97316"/>
      <stop offset="40%" stop-color="#EAB308"/>
      <stop offset="60%" stop-color="#EAB308"/>
      <stop offset="85%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <filter id="shadow2"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>

  <rect width="800" height="360" rx="12" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">LLM 对 Prompt 各位置的注意力分布</text>
  <text x="400" y="54" text-anchor="middle" font-size="13" fill="#64748B">"Lost in the Middle" — 开头和结尾的内容更容易被模型关注</text>

  <!-- Attention curve -->
  <path d="M80 250 Q120 100 200 180 Q300 230 400 240 Q500 230 600 180 Q680 100 720 120" stroke="url(#attentionGrad)" stroke-width="4" fill="none"/>
  <!-- Fill area -->
  <path d="M80 250 Q120 100 200 180 Q300 230 400 240 Q500 230 600 180 Q680 100 720 120 L720 280 L80 280 Z" fill="url(#attentionGrad)" opacity="0.12"/>

  <!-- Y axis -->
  <line x1="60" y1="80" x2="60" y2="280" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="50" y="90" text-anchor="end" font-size="11" fill="#94A3B8">高</text>
  <text x="50" y="280" text-anchor="end" font-size="11" fill="#94A3B8">低</text>
  <text x="25" y="180" text-anchor="middle" font-size="12" fill="#64748B" transform="rotate(-90 25 180)">注意力权重</text>

  <!-- X axis -->
  <line x1="60" y1="280" x2="740" y2="280" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Position labels -->
  <rect x="80" y="290" width="120" height="28" rx="4" fill="#FEE2E2"/>
  <text x="140" y="309" text-anchor="middle" font-size="12" font-weight="bold" fill="#DC2626">开头 · 高权重</text>

  <rect x="320" y="290" width="160" height="28" rx="4" fill="#FEF9C3"/>
  <text x="400" y="309" text-anchor="middle" font-size="12" font-weight="bold" fill="#A16207">中间 · 容易被稀释</text>

  <rect x="600" y="290" width="120" height="28" rx="4" fill="#FEE2E2"/>
  <text x="660" y="309" text-anchor="middle" font-size="12" font-weight="bold" fill="#DC2626">结尾 · 高权重</text>

  <!-- Content type labels -->
  <rect x="85" y="100" width="110" height="24" rx="4" fill="#DBEAFE"/>
  <text x="140" y="117" text-anchor="middle" font-size="11" fill="#1D4ED8">System Prompt</text>

  <rect x="340" y="236" width="120" height="24" rx="4" fill="#F3E8FF"/>
  <text x="400" y="253" text-anchor="middle" font-size="11" fill="#7C3AED">早期对话历史</text>

  <rect x="610" y="115" width="120" height="24" rx="4" fill="#DCFCE7"/>
  <text x="670" y="132" text-anchor="middle" font-size="11" fill="#16A34A">最近的 User 消息</text>

  <!-- Practical tips -->
  <rect x="80" y="330" width="640" height="24" rx="4" fill="#F1F5F9"/>
  <text x="400" y="347" text-anchor="middle" font-size="12" fill="#475569">💡 实践建议：关键规则放开头（System），最新指令放结尾，无关长文本不要塞中间</text>
</svg>
